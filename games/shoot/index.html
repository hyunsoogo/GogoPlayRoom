        b.attackAnim = 90;
      } else {
        b.state = 'novaBeam';
        b.stateTimer = 80;
        b.attackAnim = 80;
      }
    }
  } else if (b.state === 'iceBomb') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer === 50 || b.stateTimer === 30) {
      // Throw ice bombs that split
      const angle = Math.atan2(player.y - b.y, player.x - b.x);
      enemyBullets.push({
        x: b.x, y: b.y + 15,
        vx: Math.cos(angle) * 3.5, vy: Math.sin(angle) * 3.5,
        type: 'iceBomb', w: 12, h: 12, size: 6
      });
      // Spread fragments
      for (let i = -1; i <= 1; i += 2) {
        enemyBullets.push({
          x: b.x, y: b.y + 15,
          vx: Math.cos(angle + i * 0.4) * 2.5, vy: Math.sin(angle + i * 0.4) * 2.5,
          type: 'iceBomb', w: 8, h: 8, size: 4
        });
      }
      playTone(600, 0.1, 'sine', 0.06);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'seedBurst') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer % (b.phase === 2 ? 10 : 15) === 0 && b.stateTimer > 5) {
      const count = b.phase === 2 ? 5 : 3;
      for (let i = 0; i < count; i++) {
        const spread = (i - (count - 1) / 2) * 0.3;
        enemyBullets.push({
          x: b.x, y: b.y + 20,
          vx: spread * 2 + rand(-0.5, 0.5), vy: 3 + rand(0, 1.5),
          type: 'seed', w: 8, h: 8, size: 4
        });
      }
      playTone(500, 0.06, 'square', 0.04);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'arrowRain') {
    b.attackAnim = b.stateTimer;
    b.x += b.moveDir * spd;
    if (b.x < 60 || b.x > W - 60) b.moveDir *= -1;
    if (b.stateTimer % (b.phase === 2 ? 8 : 12) === 0) {
      enemyBullets.push({
        x: rand(30, W - 30), y: -10,
        vx: 0, vy: 4 + rand(0, 2),
        type: 'arrow', w: 8, h: 8
      });
      playTone(800, 0.04, 'sine', 0.03);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'novaBeam') {
    b.attackAnim = b.stateTimer;
    b.x += (W / 2 - b.x) * 0.08;
    b.y += (60 - b.y) * 0.08;
    if (b.stateTimer === 40) {
      // Fire large beams in multiple directions
      const count = 6;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI + Math.PI / 2;
        enemyBullets.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
          type: 'novaBeam', w: 40, h: 8
        });
      }
      screenShake(10, 25);
      playTone(100, 0.5, 'sawtooth', 0.15);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  }
}

function updateZero(b) {
  const spd = b.phase === 2 ? 2.5 : 1.8;
  const returnSpd = b.phase === 2 ? 3 : 2;

  if (b.state === 'return') {
    const tx = W / 2, ty = b.targetY;
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d > returnSpd) {
      b.x += (dx / d) * returnSpd;
      b.y += (dy / d) * returnSpd;
    } else {
      b.x = tx; b.y = ty;
      b.state = 'idle';
      b.stateTimer = 50;
    }
  } else if (b.state === 'idle') {
    b.x += Math.sin(frame * 0.02) * spd * 0.5;
    b.y = b.targetY + Math.sin(frame * 0.018) * 10;

    if (b.stateTimer <= 0) {
      b.attackPattern = (b.attackPattern + 1) % (b.phase === 2 ? 4 : 3);
      if (b.attackPattern === 0) {
        b.state = 'bloodTear';
        b.stateTimer = 80;
        b.attackAnim = 80;
      } else if (b.attackPattern === 1) {
        b.state = 'darkMinion';
        b.stateTimer = 90;
        b.attackAnim = 90;
      } else if (b.attackPattern === 2) {
        b.state = 'laserEye';
        b.stateTimer = 70;
        b.attackAnim = 70;
      } else {
        b.state = 'deathBurst';
        b.stateTimer = 100;
        b.attackAnim = 100;
      }
    }
  } else if (b.state === 'bloodTear') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer % (b.phase === 2 ? 10 : 15) === 0 && b.stateTimer > 10) {
      const angle = Math.atan2(player.y - b.y, player.x - b.x);
      for (let i = -1; i <= 1; i++) {
        enemyBullets.push({
          x: b.x, y: b.y + 15,
          vx: Math.cos(angle + i * 0.25) * 3.5, vy: Math.sin(angle + i * 0.25) * 3.5,
          type: 'bloodTear', w: 12, h: 12, size: 6
        });
      }
      playTone(180, 0.1, 'sine', 0.06);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'darkMinion') {
    b.attackAnim = b.stateTimer;
    // Spawn minion enemies
    if (b.stateTimer === 70 || b.stateTimer === 40 || (b.phase === 2 && b.stateTimer === 20)) {
      spawnEnemy('mechawaddledee', rand(50, W - 50), -20, 0);
      playTone(250, 0.15, 'square', 0.08);
      screenShake(3, 8);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'laserEye') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer === 50 || b.stateTimer === 30 || (b.phase === 2 && b.stateTimer === 15)) {
      const angle = Math.atan2(player.y - b.y, player.x - b.x);
      enemyBullets.push({
        x: b.x, y: b.y,
        vx: Math.cos(angle) * 6, vy: Math.sin(angle) * 6,
        type: 'laserEye', w: 36, h: 4
      });
      screenShake(5, 12);
      playTone(350, 0.2, 'sawtooth', 0.08);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'deathBurst') {
    b.attackAnim = b.stateTimer;
    b.x += (W / 2 - b.x) * 0.06;
    b.y += (b.targetY - b.y) * 0.06;
    if (b.stateTimer === 60 || b.stateTimer === 30) {
      const count = 16;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        enemyBullets.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
          type: 'deathBurst', w: 16, h: 16, size: 8
        });
      }
      screenShake(10, 25);
      playTone(60, 0.5, 'sawtooth', 0.15);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  }
}

// ---- Collision Detection ----
function checkCollisions() {
  // Player bullets vs enemies
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    let hit = false;

    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (rectsOverlap(b, e)) {
        e.hp -= b.damage;
        sfxHit();
        spawnParticles(b.x, b.y, '#FFF', 3, 2, 10);

        if (e.hp <= 0) {
          score += e.score;
          sfxDestroy();
          spawnParticles(e.x, e.y, '#FFAA00', 10, 3, 20);
          spawnStar(e.x, e.y);

          // Item drops
          if (Math.random() < 0.15) {
            items.push({ x: e.x, y: e.y, type: 'health', vy: 1.5 });
          } else if (Math.random() < 0.3) {
            items.push({ x: e.x, y: e.y, type: 'star', vy: 1.5 });
          }

          enemies.splice(ei, 1);
        }

        if (!b.pierce) { hit = true; break; }
      }
    }

    // Player bullets vs boss
    if (!hit && boss && boss.hp > 0 && boss.state !== 'enter') {
      if (rectsOverlap(b, boss)) {
        boss.hp -= b.damage;
        sfxHit();
        spawnParticles(b.x, b.y, '#FFCC00', 3, 2, 10);

        if (boss.hp <= 0) {
          // Boss defeated!
          score += 1000;
          sfxBossDefeat();
          screenShake(10, 30);
          spawnParticles(boss.x, boss.y, '#FFD700', 30, 5, 40);
          spawnParticles(boss.x, boss.y, '#FF4444', 20, 4, 35);

          if (stage < 5) {
            state = 'stageClear';
            stageClearTimer = 180;
            sfxStageClear();
          } else {
            state = 'victory';
            stageClearTimer = 240;
            sfxStageClear();
            setTimeout(() => { shootTriggerOverlay('VICTORY!', '#FFD700'); }, 2000);
          }
          boss = null;
        }

        if (!b.pierce) hit = true;
      }
    }

    if (hit) bullets.splice(bi, 1);
  }

  // Enemy bullets vs player
  if (player.invincible <= 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (rectsOverlap(b, player)) {
        playerHit();
        enemyBullets.splice(i, 1);
        break;
      }
    }

    // Enemies vs player (collision)
    for (const e of enemies) {
      if (rectsOverlap(e, player) && !player.inhaling) {
        playerHit();
        break;
      }
    }

    // Boss vs player
    if (boss && boss.state !== 'enter' && rectsOverlap(boss, player)) {
      playerHit();
    }
  }

  // Items vs player
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += item.vy;
    if (dist(item, player) < 25) {
      if (item.type === 'health') {
        player.hp = Math.min(player.hp + 1, player.maxHp);
        spawnParticles(player.x, player.y, '#FF4466', 8, 2, 15);
        playTone(523, 0.1, 'sine', 0.06);
        setTimeout(() => playTone(784, 0.15, 'sine', 0.06), 80);
      } else if (item.type === 'star') {
        score += 30;
        spawnParticles(player.x, player.y, '#FFD700', 5, 2, 10);
      }
      items.splice(i, 1);
    } else if (item.y > H + 20) {
      items.splice(i, 1);
    }
  }
}

function playerHit() {
  player.hp--;
  player.invincible = 90;
  sfxPlayerHit();
  screenShake(5, 12);
  spawnParticles(player.x, player.y, '#FF6688', 10, 3, 15);

  if (player.hp <= 0) {
    state = 'gameOver';
    spawnParticles(player.x, player.y, '#FF4444', 25, 5, 30);
    setTimeout(() => { shootTriggerOverlay('GAME OVER', '#FF3333'); }, 2000);
  }
}

// ---- Particles Update ----
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.star) {
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(frame * 0.1);
      drawStarShape(0, 0, p.size * 0.4, p.size, 4);
      ctx.restore();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ---- Screen Shake ----
function updateShake() {
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * shakeTimer * 0.5;
    shakeY = (Math.random() - 0.5) * shakeTimer * 0.5;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

// ---- Title Screen ----
function drawTitleScreen() {
  drawBackground();

  // Title
  ctx.save();
  const titleY = 200 + Math.sin(frame * 0.04) * 10;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 48px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FF6600';
  ctx.shadowBlur = 15;
  ctx.fillText('베스트 슈터', W / 2, titleY);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#FFEEAA';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText('BEST SHOOTER', W / 2, titleY + 35);
  ctx.restore();

  // Kirby
  drawKirby(W / 2, titleY + 110, 'none', false, 0);

  // Subtitle
  ctx.fillStyle = '#FFAACC';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('커비의 슈팅 어드벤처!', W / 2, titleY + 160);

  // Instructions
  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#FFF';
    ctx.font = '18px monospace';
    ctx.fillText('PRESS Z OR SPACE TO START', W / 2, 520);
  }

  ctx.fillStyle = '#AAA';
  ctx.font = '12px monospace';
  ctx.fillText('방향키: 이동 | Z: 발사 | X: 빨아들이기', W / 2, 580);
  ctx.fillText('적을 빨아들여 능력을 얻자!', W / 2, 600);
}

// ---- Stage Intro ----
function drawStageIntro() {
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`STAGE ${stage}`, W / 2, H / 2 - 30);

  ctx.fillStyle = '#FFF';
  ctx.font = '20px sans-serif';
  const stageNames = { 1: '드림랜드의 하늘', 2: '어둠의 요새', 3: '다크 매터의 영역', 4: '광대의 무대', 5: '제로의 심연' };
  ctx.fillText(stageNames[stage] || '', W / 2, H / 2 + 15);

  ctx.fillStyle = '#FFAACC';
  ctx.font = '14px sans-serif';
  const bossNames = { 1: 'BOSS: 메타나이트', 2: 'BOSS: 기간트 에지', 3: 'BOSS: 다크 매터', 4: 'BOSS: 마르크', 5: 'BOSS: 제로' };
  ctx.fillText(bossNames[stage] || '', W / 2, H / 2 + 50);
}

// ---- Boss Warning ----
function drawBossWarning() {
  if (bossWarning <= 0) return;
  bossWarning--;

  const alpha = Math.sin(bossWarning * 0.15) * 0.5 + 0.5;
  ctx.fillStyle = `rgba(255, 0, 0, ${alpha * 0.15})`;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = `rgba(255, 50, 50, ${alpha})`;
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('WARNING!', W / 2, H / 2 - 10);
  ctx.fillStyle = `rgba(255, 200, 200, ${alpha})`;
  ctx.font = '18px sans-serif';
  const bossNames = { 1: '메타나이트가 다가온다!', 2: '기간트 에지가 다가온다!', 3: '다크 매터가 다가온다!', 4: '마르크가 다가온다!', 5: '제로가 다가온다!' };
  ctx.fillText(bossNames[stage], W / 2, H / 2 + 25);
}

// ---- Stage Clear ----
function drawStageClear() {
  drawBackground();
  updateParticles();
  drawParticles();

  // Celebration particles
  if (frame % 5 === 0) {
    const colors = ['#FFD700', '#FF6699', '#66FFCC', '#FF8844', '#AADDFF'];
    spawnParticles(rand(50, W - 50), rand(100, H - 100), colors[randInt(0, 4)], 3, 2, 20);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FF8800';
  ctx.shadowBlur = 10;
  ctx.fillText('STAGE CLEAR!', W / 2, H / 2 - 40);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#FFF';
  ctx.font = '20px sans-serif';
  ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 10);

  drawKirby(W / 2, H / 2 + 70, player.ability, false, 0);

  if (stageClearTimer < 60) {
    const blink = Math.sin(frame * 0.1) > 0;
    if (blink) {
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.fillText('PRESS Z FOR NEXT STAGE', W / 2, H / 2 + 140);
    }
  }

  stageClearTimer--;
}

// ---- Victory Screen ----
function drawVictoryScreen() {
  drawBackground();
  updateParticles();
  drawParticles();

  if (frame % 3 === 0) {
    const colors = ['#FFD700', '#FF6699', '#66FFCC', '#FF8844', '#AADDFF', '#FFAAFF'];
    spawnParticles(rand(50, W - 50), rand(100, H - 100), colors[randInt(0, 5)], 4, 3, 25);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 44px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FFAA00';
  ctx.shadowBlur = 15;
  ctx.fillText('VICTORY!', W / 2, H / 2 - 80);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#FFAACC';
  ctx.font = '20px sans-serif';
  ctx.fillText('커비가 평화를 되찾았다!', W / 2, H / 2 - 35);

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText(`FINAL SCORE: ${score}`, W / 2, H / 2 + 10);

  drawKirby(W / 2, H / 2 + 75, 'none', false, 0);

  // Dancing animation
  const danceOffset = Math.sin(frame * 0.1) * 5;
  ctx.save();
  ctx.translate(W / 2, H / 2 + 75 + danceOffset);
  ctx.restore();

  if (stageClearTimer < 120) {
    const blink = Math.sin(frame * 0.1) > 0;
    if (blink) {
      ctx.fillStyle = '#FFF';
      ctx.font = '16px monospace';
      ctx.fillText('PRESS ESC TO EXIT', W / 2, H / 2 + 160);
    }
  }

  stageClearTimer--;
}

// ---- Game Over ----
function drawGameOver() {
  drawBackground();
  updateParticles();
  drawParticles();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FF4444';
  ctx.font = 'bold 44px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 40);

  ctx.fillStyle = '#FFF';
  ctx.font = '20px sans-serif';
  ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 10);
  ctx.fillText(`STAGE ${stage}`, W / 2, H / 2 + 40);

  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#FFF';
    ctx.font = '16px monospace';
    ctx.fillText('PRESS ESC TO EXIT', W / 2, H / 2 + 100);
  }
}

// ---- Main Draw Game ----
function drawGame() {
  // Apply shake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();

  // Draw items
  for (const item of items) drawItem(item);

  // Draw inhale effect
  drawInhaleEffect();

  // Draw enemies
  for (const e of enemies) {
    ctx.save();
    // Flash when damaged
    if (e.hp < e.maxHp && frame % 4 < 2) ctx.globalAlpha = 0.7;
    if (e.type === 'waddledee') drawWaddleDee(e.x, e.y, e.hp, e.maxHp);
    else if (e.type === 'hothead') drawHotHead(e.x, e.y);
    else if (e.type === 'watergalbros') drawWaterGalbros(e.x, e.y);
    else if (e.type === 'mechawaddledee') drawMechaWaddleDee(e.x, e.y);
    ctx.restore();

    // HP bar for enemies with > 1 maxHp
    if (e.maxHp > 1 && e.hp < e.maxHp) {
      const barW = e.w;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x - barW/2, e.y - e.h/2 - 8, barW, 4);
      ctx.fillStyle = '#44FF44';
      ctx.fillRect(e.x - barW/2, e.y - e.h/2 - 8, barW * (e.hp / e.maxHp), 4);
    }
  }

  // Draw boss
  if (boss) {
    if (boss.type === 'metaknight') drawMetaKnight(boss.x, boss.y, boss.phase, boss.attackAnim);
    else if (boss.type === 'gigantedge') drawGigantEdge(boss.x, boss.y, boss.phase, boss.attackAnim);
    else if (boss.type === 'darkmatter') drawDarkMatter(boss.x, boss.y, boss.phase, boss.attackAnim);
    else if (boss.type === 'marx') drawMarx(boss.x, boss.y, boss.phase, boss.attackAnim);
    else if (boss.type === 'zero') drawZero(boss.x, boss.y, boss.phase, boss.attackAnim);
  }

  // Draw player bullets
  for (const b of bullets) drawBullet(b);

  // Draw enemy bullets
  for (const b of enemyBullets) drawBullet(b);

  // Draw player (Kirby)
  drawKirby(player.x, player.y, player.ability, player.inhaling, player.invincible);

  // Draw particles
  drawParticles();

  // Boss warning overlay
  drawBossWarning();

  // Draw UI
  drawUI();

  ctx.restore();
}

// ---- Main Game Loop ----
function gameLoop() {
  frame++;
  ctx.clearRect(0, 0, W, H);

  // Clear justPressed at end of frame
  const clearJustPressed = () => { for (const k in justPressed) delete justPressed[k]; };

  if (state === 'title') {
    drawTitleScreen();
    if (justPressed['KeyZ'] || justPressed['Space']) {
      initAudio();
      startGame();
      state = 'stageIntro';
      stageClearTimer = 120;
    }
  } else if (state === 'stageIntro') {
    drawStageIntro();
    stageClearTimer--;
    if (stageClearTimer <= 0) {
      state = 'playing';
    }
  } else if (state === 'playing' || state === 'boss') {
    stageTimer++;
    updatePlayer();
    updateBullets();
    updateEnemies();
    if (state === 'boss') updateBoss();
    checkCollisions();
    updateParticles();
    updateShake();
    spawnWave();
    drawGame();
  } else if (state === 'stageClear') {
    drawStageClear();
    if (stageClearTimer < 60 && (justPressed['KeyZ'] || justPressed['Space'])) {
      startStage(stage + 1);
    }
  } else if (state === 'victory') {
    drawVictoryScreen();
  } else if (state === 'gameOver') {
    drawGameOver();
  }

  clearJustPressed();
  requestAnimationFrame(gameLoop);
}

// ---- Start ----
initStars();
gameLoop();
</script>
