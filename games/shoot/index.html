<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베스트 슈터</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}
canvas {
  border: 2px solid #222;
  image-rendering: auto;
  width: min(95vw, 67.5vh);
  height: min(142.5vw, 95vh);
}
/* ---- Leaderboard Overlay ---- */
#shootNameOverlay {
  font-family: 'Press Start 2P', 'Courier New', monospace;
}
#shootNewRecord {
  text-align: center; margin: 10px 0;
  animation: shootNewRecordIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes shootNewRecordIn {
  from { transform: scale(0) rotate(-10deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
#shootNewRecordTitle {
  font-size: 22px; font-weight: 900; margin-bottom: 14px;
  animation: shootNrFlash 0.6s ease-in-out infinite;
}
@keyframes shootNrFlash {
  0%, 100% { color: #FFD700; text-shadow: 0 0 10px #FFD700, 0 0 30px #FF8800; }
  50% { color: #fff; text-shadow: 0 0 20px #FFD700, 0 0 50px #FF8800, 0 0 80px #FF4400; }
}
#shootNameRow { display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; }
.shoot-name-slot { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.shoot-name-arr {
  background: none; border: none; color: rgba(255,255,255,0.5);
  font-size: 18px; cursor: pointer; padding: 2px 10px; line-height: 1;
  pointer-events: all;
}
.shoot-name-arr:hover { color: #FFD700; }
.shoot-name-arr:active { transform: scale(0.85); }
.shoot-name-char {
  width: 48px; height: 54px; display: flex; align-items: center; justify-content: center;
  font-size: 34px; font-weight: 900; font-family: 'Courier New', monospace;
  color: #FFD700; background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.15); border-radius: 8px;
}
.shoot-name-char.active {
  border-color: #FFD700; background: rgba(255,215,0,0.1);
  animation: shootNcBlink 0.5s step-end infinite;
}
@keyframes shootNcBlink { 50% { border-color: transparent; } }
#shootNameHint { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 4px; text-align: center; }
.shoot-btn-name-ok {
  margin-top: 10px; padding: 8px 36px; font-size: 18px; font-weight: bold;
  background: linear-gradient(180deg, #FFB800, #E08900);
  box-shadow: 0 4px 0 #AA6600; border: none; border-radius: 30px;
  color: #fff; cursor: pointer; pointer-events: all;
}
.shoot-btn-name-ok:active { transform: translateY(2px); box-shadow: 0 2px 0 #AA6600; }
#shootRanking {
  width: 100%; margin-top: 14px;
  animation: shootRankIn 0.4s ease-out both;
}
@keyframes shootRankIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
#shootRankTitle {
  text-align: center; font-size: 18px; font-weight: 900;
  color: #FFD700; letter-spacing: 4px; margin-bottom: 10px;
  text-shadow: 0 0 10px rgba(255,215,0,0.3);
}
.shoot-rank-row {
  display: flex; padding: 7px 14px; border-radius: 6px;
  margin-bottom: 2px; font-size: 14px; font-weight: bold; align-items: center;
}
.shoot-rank-row.header {
  color: rgba(255,255,255,0.35); font-size: 10px;
  letter-spacing: 1px; margin-bottom: 4px; padding-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.shoot-rank-row.current {
  background: rgba(255,215,0,0.12);
  animation: shootRkHL 1s ease-in-out infinite;
  border: 1px solid rgba(255,215,0,0.25);
}
@keyframes shootRkHL { 50% { background: rgba(255,215,0,0.22); } }
.shoot-rank-pos {
  width: 36px; font-family: 'Courier New', monospace; color: #888;
}
.shoot-rank-row:nth-child(2) .shoot-rank-pos { color: #FFD700; }
.shoot-rank-row:nth-child(3) .shoot-rank-pos { color: #C0C0C0; }
.shoot-rank-row:nth-child(4) .shoot-rank-pos { color: #CD7F32; }
.shoot-rank-name { flex: 1; color: #fff; font-family: 'Courier New', monospace; letter-spacing: 3px; }
.shoot-rank-score { width: 70px; text-align: right; color: #FFD700; }
.shoot-rank-game { width: 80px; text-align: right; color: #88aaff; font-size: 10px; }
.shoot-rank-you { color: #00DDFF; font-size: 10px; margin-left: 6px; white-space: nowrap; }
.shoot-go-phase.hidden { display: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="shootNameOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;font-family:'Press Start 2P',monospace;">
    <div style="max-width:420px;width:92%;text-align:center;">
        <div id="shootOverlayTitle" style="font-size:32px;font-weight:900;color:#FF3333;text-shadow:0 0 20px rgba(255,0,0,0.6);margin-bottom:15px;">GAME OVER</div>
        <div style="font-size:20px;color:#FFD700;margin-bottom:20px;" id="shootFinalScore">SCORE: 0</div>
        <div id="shootNewRecord" class="shoot-go-phase hidden">
            <div id="shootNewRecordTitle">&#9733; NEW RECORD &#9733;</div>
            <div id="shootNameRow">
                <div class="shoot-name-slot">
                    <button class="shoot-name-arr" onclick="shootNameCharChange(0,1)">&#9650;</button>
                    <div class="shoot-name-char active" id="snc0">A</div>
                    <button class="shoot-name-arr" onclick="shootNameCharChange(0,-1)">&#9660;</button>
                </div>
                <div class="shoot-name-slot">
                    <button class="shoot-name-arr" onclick="shootNameCharChange(1,1)">&#9650;</button>
                    <div class="shoot-name-char" id="snc1">A</div>
                    <button class="shoot-name-arr" onclick="shootNameCharChange(1,-1)">&#9660;</button>
                </div>
                <div class="shoot-name-slot">
                    <button class="shoot-name-arr" onclick="shootNameCharChange(2,1)">&#9650;</button>
                    <div class="shoot-name-char" id="snc2">A</div>
                    <button class="shoot-name-arr" onclick="shootNameCharChange(2,-1)">&#9660;</button>
                </div>
            </div>
            <div id="shootNameHint">&#8593;&#8595; 변경 &nbsp; &#8592;&#8594; 이동 &nbsp; ENTER 확인</div>
            <button class="shoot-btn-name-ok" onclick="shootConfirmName()">OK</button>
        </div>
        <div id="shootRanking" class="shoot-go-phase hidden">
            <div id="shootRankTitle">&#127942; RANKING &#127942;</div>
            <div id="shootRankList"></div>
        </div>
    </div>
</div>
<script>
// ============================================================
//  베스트 슈터 (Best Shooter) - Kirby Themed Vertical Shooter
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 720;
canvas.width = W;
canvas.height = H;

// ---- Input ----
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  // Intercept for name entry
  if (shootGameOverPhase === 'nameEntry') {
    if (e.code === 'ArrowUp') { shootNameCharChange(shootNamePos, 1); }
    else if (e.code === 'ArrowDown') { shootNameCharChange(shootNamePos, -1); }
    else if (e.code === 'ArrowLeft') { shootNamePos = Math.max(0, shootNamePos - 1); shootUpdateNameDisplay(); }
    else if (e.code === 'ArrowRight') { shootNamePos = Math.min(2, shootNamePos + 1); shootUpdateNameDisplay(); }
    else if (e.code === 'Enter') { shootConfirmName(); }
    e.preventDefault();
    e.stopPropagation();
    return;
  }
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// ---- Audio ----
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playTone(freq, dur, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxShoot() { playTone(880, 0.06, 'square', 0.04); }
function sfxFireShoot() { playTone(220, 0.12, 'sawtooth', 0.06); }
function sfxWaterShoot() { playTone(660, 0.08, 'sine', 0.05); }
function sfxHit() { playTone(300, 0.08, 'square', 0.06); }
function sfxDestroy() {
  playTone(180, 0.15, 'sawtooth', 0.08);
  setTimeout(() => playTone(120, 0.2, 'square', 0.06), 50);
}
function sfxInhale() { playTone(90, 0.04, 'sawtooth', 0.03); }
function sfxAbility() {
  playTone(523, 0.08, 'square', 0.07);
  setTimeout(() => playTone(659, 0.08, 'square', 0.07), 80);
  setTimeout(() => playTone(784, 0.12, 'square', 0.07), 160);
}
function sfxPlayerHit() { playTone(100, 0.25, 'square', 0.1); }
function sfxBossDefeat() {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => playTone(200 + i * 80, 0.15, 'square', 0.08), i * 120);
  }
}
function sfxBossWarn() {
  playTone(120, 0.3, 'sawtooth', 0.08);
  setTimeout(() => playTone(120, 0.3, 'sawtooth', 0.08), 400);
  setTimeout(() => playTone(120, 0.3, 'sawtooth', 0.08), 800);
}
function sfxStageClear() {
  const notes = [523, 587, 659, 784, 880, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.15, 'square', 0.07), i * 100));
}

// ---- Game State ----
let state = 'title';
let stage = 1;
let score = 0;
let frame = 0;
let stageTimer = 0;
let bossSpawned = false;
let bossWarning = 0;
let stageClearTimer = 0;
let shakeX = 0, shakeY = 0;
let shakeTimer = 0;

// ---- Leaderboard ----
const SHOOT_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
let shootRankings = [];
let shootNameChars = [0, 0, 0];
let shootNamePos = 0;
let shootNewRankIdx = -1;
let shootGameOverPhase = ''; // '', 'nameEntry', 'ranking'

function shootLoadRankings() {
  try {
    shootRankings = JSON.parse(localStorage.getItem('gogo_arcade_leaderboard') || '[]');
  } catch(e) { shootRankings = []; }
}

function shootSaveRanking(name, sc) {
  try {
    let all = JSON.parse(localStorage.getItem('gogo_arcade_leaderboard') || '[]');
    all.push({ name, score: sc, game: '베스트슈터', date: new Date().toISOString().slice(0,10) });
    all.sort((a,b) => b.score - a.score);
    if (all.length > 30) all.length = 30;
    localStorage.setItem('gogo_arcade_leaderboard', JSON.stringify(all));
    shootRankings = all;
  } catch(e) {}
}

function shootGetRankPosition(s) {
  shootLoadRankings();
  for (let i = 0; i < shootRankings.length; i++) { if (s > shootRankings[i].score) return i; }
  return shootRankings.length < 30 ? shootRankings.length : -1;
}

function shootShowNameEntry() {
  shootGameOverPhase = 'nameEntry';
  shootNameChars = [0, 0, 0];
  shootNamePos = 0;
  const nr = document.getElementById('shootNewRecord');
  nr.classList.remove('hidden');
  nr.style.animation = 'none'; nr.offsetHeight; nr.style.animation = '';
  shootUpdateNameDisplay();
}

function shootUpdateNameDisplay() {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('snc' + i);
    el.textContent = SHOOT_ALPHABET[shootNameChars[i]];
    el.classList.toggle('active', i === shootNamePos);
  }
}

window.shootNameCharChange = function(pos, dir) {
  if (shootGameOverPhase !== 'nameEntry') return;
  shootNamePos = pos;
  shootNameChars[pos] = (shootNameChars[pos] + dir + SHOOT_ALPHABET.length) % SHOOT_ALPHABET.length;
  shootUpdateNameDisplay();
};

window.shootConfirmName = function() {
  if (shootGameOverPhase !== 'nameEntry') return;
  const name = shootNameChars.map(i => SHOOT_ALPHABET[i]).join('');
  shootSaveRanking(name, score);
  document.getElementById('shootNewRecord').classList.add('hidden');
  shootShowRanking();
};

function shootShowRanking() {
  shootGameOverPhase = 'ranking';
  shootLoadRankings();
  const list = document.getElementById('shootRankList');
  const ordinals = ['1ST','2ND','3RD','4TH','5TH','6TH','7TH','8TH','9TH','10TH'];

  let html = '<div class="shoot-rank-row header"><span class="shoot-rank-pos">RANK</span><span class="shoot-rank-name">NAME</span><span class="shoot-rank-score">SCORE</span><span class="shoot-rank-game">GAME</span></div>';

  const display = shootRankings.slice(0, 10);
  if (display.length === 0) {
    html += '<div style="text-align:center;color:#666;padding:16px;font-size:13px;">기록 없음</div>';
  }
  display.forEach((r, i) => {
    const isCurrent = (i === shootNewRankIdx && r.score === score && r.game === '베스트슈터');
    html += '<div class="shoot-rank-row' + (isCurrent ? ' current' : '') + '">';
    html += '<span class="shoot-rank-pos">' + (ordinals[i] || (i+1)+'TH') + '</span>';
    html += '<span class="shoot-rank-name">' + (r.name || '---') + '</span>';
    html += '<span class="shoot-rank-score">' + (r.score || 0).toLocaleString() + '</span>';
    html += '<span class="shoot-rank-game">' + (r.game || '-') + '</span>';
    if (isCurrent) html += '<span class="shoot-rank-you">&#9664; YOU</span>';
    html += '</div>';
  });

  list.innerHTML = html;
  const rk = document.getElementById('shootRanking');
  rk.classList.remove('hidden');
  rk.style.animation = 'none'; rk.offsetHeight; rk.style.animation = '';
  shootNewRankIdx = -1;
}

function shootTriggerOverlay(title, titleColor) {
  shootNewRankIdx = shootGetRankPosition(score);
  document.getElementById('shootOverlayTitle').textContent = title;
  document.getElementById('shootOverlayTitle').style.color = titleColor;
  document.getElementById('shootOverlayTitle').style.textShadow = '0 0 20px ' + titleColor + '99';
  document.getElementById('shootFinalScore').textContent = 'SCORE: ' + score.toLocaleString();
  document.getElementById('shootNewRecord').classList.add('hidden');
  document.getElementById('shootRanking').classList.add('hidden');
  document.getElementById('shootNameOverlay').style.display = 'flex';
  if (shootNewRankIdx >= 0) {
    shootShowNameEntry();
  } else {
    shootShowRanking();
  }
}

// ---- Entities ----
let player, bullets, enemyBullets, enemies, boss, particles, items, stars;

// ---- Images ----
const images = {};
const imageFiles = {
  kirby: '기본_워프스타를 탄 커비.jpeg',
  waddledee: '적_기본_웨이들디.jpeg',
  mechawaddledee: '적_기본_메카 웨이들디.jpeg',
  watergalbros: '적_기본_워터겔브로스.jpeg',
  hothead: '적_기본_핫헤드.png',
  gigantedge: '적_보스_기간트 에지.jpeg',
  metaknight: '적_보스_메타나이트.jpeg',
};

let imagesLoaded = 0;
const totalImages = Object.keys(imageFiles).length;

for (const [key, file] of Object.entries(imageFiles)) {
  const img = new Image();
  img.onload = () => { imagesLoaded++; };
  img.onerror = () => { imagesLoaded++; };
  img.src = encodeURI(file);
  images[key] = img;
}

// ---- Helper Functions ----
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function rectsOverlap(a, b) {
  return a.x - a.w/2 < b.x + b.w/2 &&
         a.x + a.w/2 > b.x - b.w/2 &&
         a.y - a.h/2 < b.y + b.h/2 &&
         a.y + a.h/2 > b.y - b.h/2;
}

function screenShake(intensity, duration) {
  shakeTimer = duration;
  shakeX = intensity;
  shakeY = intensity;
}

// ---- Particle System ----
function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const spd = rand(speed * 0.3, speed);
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life, maxLife: life, color, size: rand(2, 5)
    });
  }
}

function spawnStar(x, y) {
  for (let i = 0; i < 5; i++) {
    const angle = rand(0, Math.PI * 2);
    const spd = rand(1, 3);
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 30, maxLife: 30, color: '#FFD700', size: rand(3, 6), star: true
    });
  }
}

// ---- Drawing Helpers ----
function drawImageFit(img, x, y, w, h) {
  if (!img || !img.complete || img.naturalWidth === 0) return false;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(img, x - w/2, y - h/2, w, h);
  ctx.restore();
  return true;
}

function drawImageRect(img, x, y, w, h) {
  if (!img || !img.complete || img.naturalWidth === 0) return false;
  ctx.drawImage(img, x - w/2, y - h/2, w, h);
  return true;
}

// ---- Draw Characters ----
function drawKirby(x, y, ability, inhaling, invincible) {
  ctx.save();
  ctx.translate(x, y);
  if (invincible > 0 && Math.floor(frame / 3) % 2 === 0) ctx.globalAlpha = 0.4;

  // Body
  ctx.fillStyle = '#FFB0C0';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 16, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#E08090';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Feet
  ctx.fillStyle = '#DD3366';
  ctx.beginPath(); ctx.ellipse(-8, 14, 7, 4, -0.15, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, 14, 7, 4, 0.15, 0, Math.PI * 2); ctx.fill();

  // Arms
  ctx.fillStyle = '#FFB0C0';
  ctx.strokeStyle = '#E08090';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(-18, 2, 5, 6, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(18, 2, 5, 6, 0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#191950';
  ctx.beginPath(); ctx.ellipse(-6, -3, 3.5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -3, 3.5, 5.5, 0, 0, Math.PI * 2); ctx.fill();

  // Eye highlights
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.ellipse(-7, -5.5, 1.8, 2.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -5.5, 1.8, 2.2, 0, 0, Math.PI * 2); ctx.fill();

  // Blue iris
  ctx.fillStyle = '#4466EE';
  ctx.beginPath(); ctx.ellipse(-5, -1, 2, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, -1, 2, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Blush
  ctx.fillStyle = 'rgba(255, 80, 100, 0.35)';
  ctx.beginPath(); ctx.ellipse(-12, 3, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12, 3, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // Mouth
  if (inhaling) {
    ctx.fillStyle = '#220011';
    ctx.beginPath(); ctx.ellipse(0, 5, 7, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#440022';
    ctx.beginPath(); ctx.ellipse(0, 5, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.strokeStyle = '#AA3366';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 4, 3, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  }

  // Ability hats
  if (ability === 'fire') {
    // Fire crown
    const t = frame * 0.15;
    ctx.fillStyle = '#FF4400';
    ctx.beginPath();
    ctx.moveTo(-10, -14); ctx.lineTo(-6, -24 + Math.sin(t) * 3);
    ctx.lineTo(-2, -16); ctx.lineTo(2, -28 + Math.sin(t + 1) * 3);
    ctx.lineTo(6, -16); ctx.lineTo(10, -22 + Math.sin(t + 2) * 3);
    ctx.lineTo(12, -14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#FFAA00';
    ctx.beginPath();
    ctx.moveTo(-7, -14); ctx.lineTo(-3, -20 + Math.sin(t) * 2);
    ctx.lineTo(0, -15); ctx.lineTo(3, -22 + Math.sin(t + 1) * 2);
    ctx.lineTo(7, -14); ctx.closePath(); ctx.fill();
  } else if (ability === 'water') {
    // Water crown
    ctx.fillStyle = '#3399FF';
    ctx.beginPath();
    ctx.ellipse(0, -16, 12, 5, 0, Math.PI, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#66BBFF';
    for (let i = -2; i <= 2; i++) {
      const bx = i * 5;
      const by = -20 - Math.abs(i) * 2 + Math.sin(frame * 0.1 + i) * 2;
      ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  ctx.restore();
}

function drawWaddleDee(x, y, hp, maxHp) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#E8955A';
  ctx.beginPath(); ctx.ellipse(0, 0, 14, 13, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#C07040'; ctx.lineWidth = 1; ctx.stroke();

  // Face area
  ctx.fillStyle = '#FDDCB0';
  ctx.beginPath(); ctx.ellipse(0, 1, 10, 9, 0, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#1a1a40';
  ctx.beginPath(); ctx.ellipse(-4, -1, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -1, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // Blush
  ctx.fillStyle = 'rgba(220, 100, 80, 0.3)';
  ctx.beginPath(); ctx.ellipse(-8, 3, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, 3, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

  // Feet
  ctx.fillStyle = '#E8955A';
  ctx.beginPath(); ctx.ellipse(-6, 12, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, 12, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawHotHead(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#DD4422';
  ctx.beginPath(); ctx.ellipse(0, 2, 15, 14, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#AA2200'; ctx.lineWidth = 1.5; ctx.stroke();

  // Inner lighter area
  ctx.fillStyle = '#FF7744';
  ctx.beginPath(); ctx.ellipse(0, 4, 10, 9, 0, 0, Math.PI * 2); ctx.fill();

  // Flames on top
  const t = frame * 0.2;
  ctx.fillStyle = '#FF8800';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 6 - 4, -10);
    ctx.quadraticCurveTo(i * 6, -22 + Math.sin(t + i * 2) * 4, i * 6 + 4, -10);
    ctx.fill();
  }
  ctx.fillStyle = '#FFCC00';
  ctx.beginPath();
  ctx.moveTo(-2, -10);
  ctx.quadraticCurveTo(0, -18 + Math.sin(t + 1) * 3, 2, -10);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.ellipse(-5, -1, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -1, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-4, 0, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, 0, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // Angry brows
  ctx.strokeStyle = '#661100';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-9, -6); ctx.lineTo(-3, -4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9, -6); ctx.lineTo(3, -4); ctx.stroke();

  ctx.restore();
}

function drawWaterGalbros(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Water drops around
  const t = frame * 0.1;
  ctx.fillStyle = 'rgba(100, 180, 255, 0.4)';
  for (let i = 0; i < 4; i++) {
    const angle = t + i * Math.PI / 2;
    const dx = Math.cos(angle) * 20;
    const dy = Math.sin(angle) * 18;
    ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI * 2); ctx.fill();
  }

  // Body
  ctx.fillStyle = '#3388CC';
  ctx.beginPath(); ctx.ellipse(0, 0, 16, 15, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#226699'; ctx.lineWidth = 1.5; ctx.stroke();

  // Belly
  ctx.fillStyle = '#88CCEE';
  ctx.beginPath(); ctx.ellipse(0, 3, 10, 9, 0, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.ellipse(-5, -2, 4, 4.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -2, 4, 4.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#112244';
  ctx.beginPath(); ctx.ellipse(-4, -1, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -1, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // Mouth
  ctx.fillStyle = '#114477';
  ctx.beginPath(); ctx.ellipse(0, 6, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Fin on top
  ctx.fillStyle = '#2277AA';
  ctx.beginPath();
  ctx.moveTo(-3, -14); ctx.lineTo(0, -22); ctx.lineTo(3, -14);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawMechaWaddleDee(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body (metallic)
  ctx.fillStyle = '#888899';
  ctx.beginPath(); ctx.ellipse(0, 0, 15, 14, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#556'; ctx.lineWidth = 2; ctx.stroke();

  // Visor
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.moveTo(-10, -4); ctx.lineTo(10, -4); ctx.lineTo(8, 2); ctx.lineTo(-8, 2);
  ctx.closePath(); ctx.fill();

  // Eye lights
  ctx.fillStyle = '#FF3333';
  ctx.beginPath(); ctx.ellipse(-4, -1, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FF3333';
  ctx.beginPath(); ctx.ellipse(4, -1, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();

  // Antenna
  ctx.strokeStyle = '#667';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, -20); ctx.stroke();
  ctx.fillStyle = '#F44';
  ctx.beginPath(); ctx.arc(0, -21, 2, 0, Math.PI * 2); ctx.fill();

  // Legs
  ctx.fillStyle = '#667';
  ctx.beginPath(); ctx.ellipse(-6, 13, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, 13, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawMetaKnight(x, y, phase, attackAnim) {
  ctx.save();
  ctx.translate(x, y);

  // Cape
  const capeWave = Math.sin(frame * 0.08) * 5;
  ctx.fillStyle = phase === 2 ? '#6622AA' : '#3322AA';
  ctx.beginPath();
  ctx.moveTo(-25, -5);
  ctx.quadraticCurveTo(-30, 25 + capeWave, -15, 35);
  ctx.lineTo(0, 30);
  ctx.lineTo(15, 35);
  ctx.quadraticCurveTo(30, 25 - capeWave, 25, -5);
  ctx.closePath();
  ctx.fill();

  // Body
  ctx.fillStyle = '#2233AA';
  ctx.beginPath(); ctx.ellipse(0, 0, 20, 18, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#112277'; ctx.lineWidth = 2; ctx.stroke();

  // Mask
  ctx.fillStyle = '#C0C0D0';
  ctx.beginPath();
  ctx.ellipse(0, -2, 18, 14, 0, -0.2, Math.PI + 0.2);
  ctx.fill();
  ctx.strokeStyle = '#8888AA'; ctx.lineWidth = 1.5; ctx.stroke();

  // Mask V-shape
  ctx.strokeStyle = '#8888AA';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-8, -6); ctx.lineTo(0, 0); ctx.lineTo(8, -6); ctx.stroke();

  // Eyes (glowing yellow)
  const eyeGlow = Math.sin(frame * 0.1) * 0.2 + 0.8;
  ctx.fillStyle = `rgba(255, 255, 100, ${eyeGlow})`;
  ctx.beginPath(); ctx.ellipse(-6, -3, 3, 2, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -3, 3, 2, 0.2, 0, Math.PI * 2); ctx.fill();

  // Sword (Galaxia)
  if (attackAnim > 0) {
    const swordAngle = -Math.PI/2 + Math.sin(attackAnim * 0.3) * 1.5;
    ctx.save();
    ctx.translate(20, 0);
    ctx.rotate(swordAngle);
    // Blade
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(0, -3); ctx.lineTo(30, -2); ctx.lineTo(35, 0); ctx.lineTo(30, 2); ctx.lineTo(0, 3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#CC9900'; ctx.lineWidth = 1; ctx.stroke();
    // Handle
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-8, -3, 8, 6);
    // Guard
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.ellipse(0, 0, 3, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Wings in phase 2
  if (phase === 2) {
    const wingFlap = Math.sin(frame * 0.15) * 8;
    ctx.fillStyle = 'rgba(80, 50, 150, 0.7)';
    // Left wing
    ctx.beginPath();
    ctx.moveTo(-18, -5);
    ctx.quadraticCurveTo(-40, -20 + wingFlap, -35, 5);
    ctx.quadraticCurveTo(-30, 15, -18, 10);
    ctx.closePath(); ctx.fill();
    // Right wing
    ctx.beginPath();
    ctx.moveTo(18, -5);
    ctx.quadraticCurveTo(40, -20 - wingFlap, 35, 5);
    ctx.quadraticCurveTo(30, 15, 18, 10);
    ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

function drawGigantEdge(x, y, phase, attackAnim) {
  ctx.save();
  ctx.translate(x, y);

  // Body (large armored)
  ctx.fillStyle = phase === 2 ? '#445544' : '#556655';
  ctx.beginPath(); ctx.ellipse(0, 5, 32, 35, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#334433'; ctx.lineWidth = 2.5; ctx.stroke();

  // Armor plates
  ctx.fillStyle = phase === 2 ? '#667766' : '#778877';
  ctx.beginPath(); ctx.ellipse(0, -5, 28, 20, 0, 0, Math.PI); ctx.fill();
  ctx.strokeStyle = '#556655'; ctx.lineWidth = 1.5; ctx.stroke();

  // Helmet
  ctx.fillStyle = '#445544';
  ctx.beginPath();
  ctx.moveTo(-20, -15);
  ctx.quadraticCurveTo(-22, -35, 0, -40);
  ctx.quadraticCurveTo(22, -35, 20, -15);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#334433'; ctx.lineWidth = 2; ctx.stroke();

  // Visor
  ctx.fillStyle = '#112211';
  ctx.beginPath();
  ctx.moveTo(-15, -18); ctx.lineTo(15, -18);
  ctx.lineTo(12, -10); ctx.lineTo(-12, -10);
  ctx.closePath(); ctx.fill();

  // Eyes
  const eyeFlicker = Math.sin(frame * 0.12) * 0.3 + 0.7;
  ctx.fillStyle = phase === 2 ? `rgba(255, 80, 80, ${eyeFlicker})` : `rgba(255, 200, 100, ${eyeFlicker})`;
  ctx.beginPath(); ctx.ellipse(-6, -14, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -14, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

  // Shield (left hand)
  ctx.fillStyle = '#889988';
  ctx.strokeStyle = '#667766';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(-30, 5, 12, 18, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#AABBAA';
  ctx.beginPath(); ctx.ellipse(-30, 5, 6, 10, -0.2, 0, Math.PI * 2); ctx.fill();

  // Sword (right hand)
  const swordSwing = attackAnim > 0 ? Math.sin(attackAnim * 0.25) * 1.2 : 0;
  ctx.save();
  ctx.translate(30, -5);
  ctx.rotate(-0.8 + swordSwing);
  // Blade
  ctx.fillStyle = '#AABBCC';
  ctx.beginPath();
  ctx.moveTo(0, -4); ctx.lineTo(40, -3); ctx.lineTo(45, 0); ctx.lineTo(40, 3); ctx.lineTo(0, 4);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#8899AA'; ctx.lineWidth = 1; ctx.stroke();
  // Handle
  ctx.fillStyle = '#664422';
  ctx.fillRect(-10, -4, 10, 8);
  // Guard
  ctx.fillStyle = '#AABBAA';
  ctx.beginPath(); ctx.ellipse(0, 0, 4, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Feet
  ctx.fillStyle = '#445544';
  ctx.beginPath(); ctx.ellipse(-15, 38, 10, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15, 38, 10, 5, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ---- Draw Dark Matter (Stage 3 Boss) ----
function drawDarkMatter(x, y, phase, attackAnim) {
  ctx.save();
  ctx.translate(x, y);

  // Petal-like orange decorations orbiting
  const petalCount = 8;
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2 + frame * 0.03;
    const r = 28 + Math.sin(frame * 0.05 + i) * 4;
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    ctx.fillStyle = phase === 2 ? '#FF4400' : '#FF8800';
    ctx.beginPath(); ctx.ellipse(px, py, 6, 3, angle, 0, Math.PI * 2); ctx.fill();
  }

  // Dark sphere body
  const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 30);
  grad.addColorStop(0, phase === 2 ? '#440022' : '#1a0033');
  grad.addColorStop(0.7, phase === 2 ? '#220011' : '#0d001a');
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill();

  // Single eye
  const eyePulse = Math.sin(frame * 0.08) * 2;
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.ellipse(0, -2, 12 + eyePulse, 10, 0, 0, Math.PI * 2); ctx.fill();
  // Iris
  const lookX = Math.sin(frame * 0.04) * 3;
  ctx.fillStyle = phase === 2 ? '#FF0000' : '#CC2200';
  ctx.beginPath(); ctx.arc(lookX, -2, 6, 0, Math.PI * 2); ctx.fill();
  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(lookX, -2, 3, 0, Math.PI * 2); ctx.fill();

  // Phase 2 dark aura
  if (phase === 2) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = '#660033';
    ctx.beginPath(); ctx.arc(0, 0, 38, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Attack flash
  if (attackAnim > 30) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#FF00FF';
    ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ---- Draw Marx (Stage 4 Boss) ----
function drawMarx(x, y, phase, attackAnim) {
  ctx.save();
  ctx.translate(x, y);

  // Wings
  const wingFlap = Math.sin(frame * 0.12) * 10;
  // Left wing
  ctx.fillStyle = phase === 2 ? '#AA00AA' : '#9933CC';
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.quadraticCurveTo(-45, -25 + wingFlap, -40, 5);
  ctx.quadraticCurveTo(-35, 20, -12, 10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = phase === 2 ? '#FF44FF' : '#CC66FF';
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.quadraticCurveTo(-35, -15 + wingFlap, -30, 5);
  ctx.quadraticCurveTo(-25, 12, -12, 8);
  ctx.closePath(); ctx.fill();
  // Right wing
  ctx.fillStyle = phase === 2 ? '#AA00AA' : '#9933CC';
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.quadraticCurveTo(45, -25 - wingFlap, 40, 5);
  ctx.quadraticCurveTo(35, 20, 12, 10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = phase === 2 ? '#FF44FF' : '#CC66FF';
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.quadraticCurveTo(35, -15 - wingFlap, 30, 5);
  ctx.quadraticCurveTo(25, 12, 12, 8);
  ctx.closePath(); ctx.fill();

  // Body (sphere)
  ctx.fillStyle = phase === 2 ? '#CC2255' : '#DD4477';
  ctx.beginPath(); ctx.arc(0, 5, 22, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#AA2255'; ctx.lineWidth = 2; ctx.stroke();

  // Jester hat
  ctx.fillStyle = '#3322AA';
  ctx.beginPath();
  ctx.moveTo(-15, -12);
  ctx.quadraticCurveTo(-25, -40, -18, -45);
  ctx.quadraticCurveTo(-10, -30, 0, -18);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#CC2222';
  ctx.beginPath();
  ctx.moveTo(15, -12);
  ctx.quadraticCurveTo(25, -40, 18, -45);
  ctx.quadraticCurveTo(10, -30, 0, -18);
  ctx.closePath(); ctx.fill();
  // Pompoms
  ctx.fillStyle = '#FFDD00';
  ctx.beginPath(); ctx.arc(-18, -45, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(18, -45, 5, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.ellipse(-7, -2, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, -2, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = phase === 2 ? '#FF0000' : '#222';
  ctx.beginPath(); ctx.arc(-7, -1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -1, 3, 0, Math.PI * 2); ctx.fill();

  // Mouth (grin)
  ctx.strokeStyle = phase === 2 ? '#FF0044' : '#222';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 6, 10, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Feet (shoe-like)
  ctx.fillStyle = '#7733AA';
  ctx.beginPath(); ctx.ellipse(-10, 26, 8, 4, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, 26, 8, 4, 0.3, 0, Math.PI * 2); ctx.fill();

  // Attack flash
  if (attackAnim > 30) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#FF88FF';
    ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ---- Draw Zero (Stage 5 Boss) ----
function drawZero(x, y, phase, attackAnim) {
  ctx.save();
  ctx.translate(x, y);

  // Blood drip particles (phase 2)
  if (phase === 2) {
    for (let i = 0; i < 5; i++) {
      const dripY = (frame * 1.5 + i * 30) % 60;
      const dripX = Math.sin(i * 2.5) * 15;
      ctx.fillStyle = `rgba(180, 0, 0, ${1 - dripY / 60})`;
      ctx.beginPath(); ctx.ellipse(dripX, 20 + dripY, 3, 4, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  // White sphere body (large)
  const grad = ctx.createRadialGradient(-5, -5, 5, 0, 0, 33);
  grad.addColorStop(0, '#FFFFFF');
  grad.addColorStop(0.6, phase === 2 ? '#EECCCC' : '#F0F0F0');
  grad.addColorStop(1, phase === 2 ? '#DDAAAA' : '#CCCCCC');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, 33, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = phase === 2 ? '#AA6666' : '#AAAAAA';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Single large red eye
  const eyePulse = Math.sin(frame * 0.06) * 3;
  // Eye white (slightly red-tinted)
  ctx.fillStyle = '#FFEEEE';
  ctx.beginPath(); ctx.ellipse(0, 0, 16 + eyePulse, 14, 0, 0, Math.PI * 2); ctx.fill();
  // Blood-red iris
  const irisGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 10);
  irisGrad.addColorStop(0, '#FF0000');
  irisGrad.addColorStop(0.5, '#CC0000');
  irisGrad.addColorStop(1, '#880000');
  ctx.fillStyle = irisGrad;
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
  // Eye shine
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(-4, -4, 3, 0, Math.PI * 2); ctx.fill();

  // Blood tear from eye
  ctx.fillStyle = '#BB0000';
  const tearLen = 8 + Math.sin(frame * 0.08) * 3;
  ctx.beginPath();
  ctx.moveTo(-3, 12);
  ctx.quadraticCurveTo(0, 12 + tearLen, 3, 12);
  ctx.closePath(); ctx.fill();

  // Phase 2 red aura
  if (phase === 2) {
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.08) * 0.08;
    ctx.fillStyle = '#FF0000';
    ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Attack flash
  if (attackAnim > 30) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#FF2222';
    ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ---- Draw Bullets ----
function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  if (b.type === 'laser') {
    ctx.fillStyle = '#AAFFAA';
    ctx.shadowColor = '#00FF00';
    ctx.shadowBlur = 6;
    ctx.fillRect(-2, -6, 4, 12);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(-1, -4, 2, 8);
  } else if (b.type === 'fire') {
    ctx.fillStyle = '#FF6600';
    ctx.shadowColor = '#FF4400';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(0, 0, b.size || 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFCC00';
    ctx.beginPath(); ctx.arc(0, 0, (b.size || 5) * 0.5, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'water') {
    ctx.fillStyle = '#44AAFF';
    ctx.shadowColor = '#2288FF';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(0, 0, b.size || 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#88DDFF';
    ctx.beginPath(); ctx.arc(-1, -1, (b.size || 4) * 0.4, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'enemyFire') {
    ctx.fillStyle = '#FF4400';
    ctx.shadowColor = '#FF2200';
    ctx.shadowBlur = 6;
    const s = b.size || 5;
    ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFAA00';
    ctx.beginPath(); ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'enemyWater') {
    ctx.fillStyle = '#2266CC';
    ctx.shadowColor = '#1144AA';
    ctx.shadowBlur = 6;
    const s = b.size || 5;
    ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#66AAEE';
    ctx.beginPath(); ctx.arc(-1, -1, s * 0.4, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'bossSword') {
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 8;
    ctx.save();
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.beginPath();
    ctx.moveTo(-12, -3); ctx.lineTo(12, 0); ctx.lineTo(-12, 3);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (b.type === 'bossRock') {
    ctx.fillStyle = '#887766';
    ctx.beginPath(); ctx.arc(0, 0, b.size || 8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#665544'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#AA9988';
    ctx.beginPath(); ctx.arc(-2, -2, (b.size || 8) * 0.4, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'darkOrb') {
    ctx.fillStyle = '#440066';
    ctx.shadowColor = '#8800CC';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(0, 0, b.size || 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#9933FF';
    ctx.beginPath(); ctx.arc(0, 0, (b.size || 6) * 0.4, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'darkBeam') {
    ctx.fillStyle = '#8800FF';
    ctx.shadowColor = '#AA44FF';
    ctx.shadowBlur = 8;
    ctx.save();
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillRect(-15, -3, 30, 6);
    ctx.fillStyle = '#CC88FF';
    ctx.fillRect(-12, -1, 24, 2);
    ctx.restore();
  } else if (b.type === 'voidPulse') {
    ctx.fillStyle = `rgba(100, 0, 150, 0.6)`;
    ctx.shadowColor = '#6600AA';
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(0, 0, b.size || 10, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#AA44FF'; ctx.lineWidth = 2; ctx.stroke();
  } else if (b.type === 'iceBomb') {
    ctx.fillStyle = '#88DDFF';
    ctx.shadowColor = '#44AAFF';
    ctx.shadowBlur = 6;
    const s = b.size || 5;
    ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#CCFFFF';
    ctx.beginPath(); ctx.arc(-1, -1, s * 0.4, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'seed') {
    ctx.fillStyle = '#44AA22';
    ctx.beginPath(); ctx.arc(0, 0, b.size || 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#88DD44';
    ctx.beginPath(); ctx.arc(-1, -1, (b.size || 4) * 0.3, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === 'arrow') {
    ctx.fillStyle = '#FFD700';
    ctx.save();
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.beginPath();
    ctx.moveTo(-8, -2); ctx.lineTo(8, 0); ctx.lineTo(-8, 2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (b.type === 'novaBeam') {
    ctx.fillStyle = '#FF88FF';
    ctx.shadowColor = '#FF44FF';
    ctx.shadowBlur = 12;
    ctx.save();
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillRect(-20, -4, 40, 8);
    ctx.fillStyle = '#FFCCFF';
    ctx.fillRect(-16, -2, 32, 4);
    ctx.restore();
  } else if (b.type === 'bloodTear') {
    ctx.fillStyle = '#CC0000';
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, -(b.size || 6));
    ctx.quadraticCurveTo(b.size || 6, 0, 0, b.size || 6);
    ctx.quadraticCurveTo(-(b.size || 6), 0, 0, -(b.size || 6));
    ctx.closePath(); ctx.fill();
  } else if (b.type === 'laserEye') {
    ctx.fillStyle = '#FF0000';
    ctx.shadowColor = '#FF4444';
    ctx.shadowBlur = 10;
    ctx.save();
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillRect(-18, -2, 36, 4);
    ctx.fillStyle = '#FF8888';
    ctx.fillRect(-14, -1, 28, 2);
    ctx.restore();
  } else if (b.type === 'deathBurst') {
    ctx.fillStyle = `rgba(200, 0, 0, 0.7)`;
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(0, 0, b.size || 8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 1.5; ctx.stroke();
  } else {
    ctx.fillStyle = '#FF88FF';
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// ---- Draw Items ----
function drawItem(item) {
  ctx.save();
  ctx.translate(item.x, item.y);
  const bob = Math.sin(frame * 0.1) * 3;
  ctx.translate(0, bob);

  if (item.type === 'health') {
    // Tomato (Kirby's health item)
    ctx.fillStyle = '#FF2200';
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#00AA00';
    ctx.beginPath();
    ctx.moveTo(-3, -7); ctx.quadraticCurveTo(0, -14, 3, -7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(-3, -2, 3, 0, Math.PI * 2); ctx.fill();
  } else if (item.type === 'star') {
    ctx.fillStyle = '#FFD700';
    drawStarShape(0, 0, 6, 10, 5);
    ctx.fillStyle = '#FFEE88';
    drawStarShape(0, 0, 3, 5, 5);
  }
  ctx.restore();
}

function drawStarShape(cx, cy, innerR, outerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// ---- Draw Background ----
function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: rand(0, W), y: rand(0, H),
      speed: rand(0.5, 2.5), size: rand(1, 3),
      brightness: rand(0.3, 1)
    });
  }
}

function drawBackground() {
  // Gradient sky
  let grad;
  if (stage === 1) {
    grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#1a1a4e');
    grad.addColorStop(1, '#2a1a5e');
  } else if (stage === 3) {
    grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a001a');
    grad.addColorStop(0.5, '#1a0033');
    grad.addColorStop(1, '#2a0044');
  } else if (stage === 4) {
    grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a2a');
    grad.addColorStop(0.5, '#2a1a3a');
    grad.addColorStop(1, '#3a1a4a');
  } else if (stage === 5) {
    grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0000');
    grad.addColorStop(0.5, '#2a0000');
    grad.addColorStop(1, '#0a0000');
  } else {
    grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0000');
    grad.addColorStop(0.5, '#2a0a1a');
    grad.addColorStop(1, '#3a1a2a');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = -5; s.x = rand(0, W); }
    ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
  }
}

// ---- Draw Inhale Effect ----
function drawInhaleEffect() {
  if (!player.inhaling) return;

  const inhaleLen = 200;
  const inhaleWidth = 80;

  ctx.save();
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.3) * 0.1;

  // Suction cone (upward from Kirby)
  const grad = ctx.createLinearGradient(player.x, player.y - 10, player.x, player.y - inhaleLen);
  grad.addColorStop(0, 'rgba(255, 200, 255, 0.5)');
  grad.addColorStop(1, 'rgba(255, 200, 255, 0)');
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(player.x - 10, player.y - 10);
  ctx.lineTo(player.x - inhaleWidth, player.y - inhaleLen);
  ctx.lineTo(player.x + inhaleWidth, player.y - inhaleLen);
  ctx.lineTo(player.x + 10, player.y - 10);
  ctx.closePath();
  ctx.fill();

  // Suction particles
  if (frame % 3 === 0) {
    const px = player.x + rand(-inhaleWidth, inhaleWidth);
    const py = player.y - rand(20, inhaleLen);
    particles.push({
      x: px, y: py, vx: (player.x - px) * 0.05, vy: (player.y - py) * 0.08,
      life: 15, maxLife: 15, color: '#FFCCFF', size: rand(2, 4)
    });
  }

  ctx.restore();
}

  // Stage
  ctx.fillStyle = '#FFF';
  ctx.font = '13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`STAGE ${stage}`, 15, 25);

  // Boss HP Bar
  if (boss && boss.hp > 0) {
    const bossBarW = 300;
    const bossBarX = (W - bossBarW) / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bossBarX - 5, 40, bossBarW + 10, 22);
    ctx.strokeStyle = '#FF4444';
    ctx.lineWidth = 1;
    ctx.strokeRect(bossBarX - 5, 40, bossBarW + 10, 22);

    ctx.fillStyle = '#CC2244';
    ctx.fillRect(bossBarX, 44, (boss.hp / boss.maxHp) * bossBarW, 14);
    ctx.fillStyle = '#FF4466';
    ctx.fillRect(bossBarX, 44, (boss.hp / boss.maxHp) * bossBarW, 7);

    ctx.fillStyle = '#FFF';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, W / 2, 55);
  }

  // Controls hint (first few seconds)
  if (stageTimer < 300 && stage === 1 && !boss) {
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, 1 - stageTimer / 300)})`;
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('방향키: 이동 | Z: 발사 | X: 빨아들이기', W / 2, H - 60);
  }
}

// ---- Spawn Enemies ----
function spawnEnemy(type, x, y, pattern) {
  const defs = {
    waddledee: { hp: 2, w: 28, h: 28, speed: 1.0, shootRate: 0, ability: 'none', score: 50 },
    hothead: { hp: 3, w: 32, h: 32, speed: 0.8, shootRate: 280, ability: 'fire', score: 100 },
    watergalbros: { hp: 3, w: 32, h: 32, speed: 0.7, shootRate: 260, ability: 'water', score: 100 },
    mechawaddledee: { hp: 3, w: 30, h: 30, speed: 1.0, shootRate: 220, ability: 'none', score: 150 },
  };
  const def = defs[type];
  enemies.push({
    x: x || rand(40, W - 40),
    y: y || -20,
    w: def.w, h: def.h,
    type, hp: def.hp, maxHp: def.hp,
    vx: 0, vy: def.speed,
    shootTimer: randInt(60, def.shootRate || 999),
    shootRate: def.shootRate,
    ability: def.ability,
    score: def.score,
    moveTimer: 0,
    movePattern: pattern !== undefined ? pattern : 0
  });
}

// Spawn a formation of enemies in a pattern
function spawnFormation(type, formation, centerX, startY) {
  const cx = centerX || W / 2;
  const sy = startY || -20;
  const gap = 40;
  const delay = 12; // frames between each enemy in formation

  if (formation === 'vee') {
    // V-shape: 2 enemies in a V
    spawnEnemy(type, cx - gap, sy, 0);
    spawnEnemy(type, cx + gap, sy - gap * 0.6, 0);
  } else if (formation === 'line') {
    // Horizontal line: 2 enemies side by side
    spawnEnemy(type, cx - gap * 0.8, sy, 0);
    spawnEnemy(type, cx + gap * 0.8, sy, 0);
  } else if (formation === 'column') {
    // Vertical column: staggered entry
    spawnEnemy(type, cx, sy, 0);
    spawnEnemy(type, cx, sy - gap, 0);
  } else if (formation === 'diagonal') {
    // Diagonal line
    spawnEnemy(type, cx - gap, sy, 0);
    spawnEnemy(type, cx + gap, sy - gap, 0);
  } else if (formation === 'single') {
    spawnEnemy(type, cx, sy, 0);
  }
}

// Spawn a health pickup at a given position
function spawnHealthItem(x, y) {
  items.push({ x: x || W / 2, y: y || -10, type: 'health', vy: 1.2 });
}

function spawnWave() {
  const t = stageTimer;

  if (stage === 1) {
    if (bossSpawned) return;
    // Stage 1: gentle formations with clear patterns

    // Wave 1: pair of waddle dees in V
    if (t === 100) spawnFormation('waddledee', 'vee', 240);
    // Wave 2: single hothead (ability pickup chance)
    if (t === 320) spawnFormation('hothead', 'single', 300);
    // Health item between waves
    if (t === 480) spawnHealthItem(200);
    // Wave 3: waddle dee line
    if (t === 550) spawnFormation('waddledee', 'line', 240);
    // Wave 4: water enemy (ability pickup chance)
    if (t === 750) spawnFormation('watergalbros', 'single', 180);
    // Wave 5: hothead + waddle dee diagonal
    if (t === 950) { spawnFormation('waddledee', 'diagonal', 300); spawnFormation('hothead', 'single', 140); }
    // Health item
    if (t === 1100) spawnHealthItem(320);
    // Wave 6: pair of waddle dees
    if (t === 1180) spawnFormation('waddledee', 'vee', 200);
    // Wave 7: water enemy column
    if (t === 1350) spawnFormation('watergalbros', 'single', 350);

    // Boss warning
    if (t === 1550 && !bossSpawned) {
      bossWarning = 120;
      sfxBossWarn();
    }
    if (t === 1670 && !bossSpawned) {
      spawnBoss('metaknight');
      bossSpawned = true;
    }
  } else if (stage === 2) {
    if (bossSpawned) return;
    // Stage 2: slightly tougher formations

    // Wave 1: waddle dee line
    if (t === 100) spawnFormation('waddledee', 'line', 240);
    // Wave 2: single mecha waddle dee
    if (t === 300) spawnFormation('mechawaddledee', 'single', 300);
    // Health item
    if (t === 450) spawnHealthItem(160);
    // Wave 3: hothead + water in diagonal
    if (t === 530) { spawnFormation('hothead', 'single', 150); spawnFormation('watergalbros', 'single', 350); }
    // Wave 4: mecha waddle dee pair
    if (t === 750) spawnFormation('mechawaddledee', 'line', 240);
    // Health item
    if (t === 900) spawnHealthItem(W / 2);
    // Wave 5: hothead column
    if (t === 980) spawnFormation('hothead', 'single', 200);
    // Wave 6: waddle dee vee + water
    if (t === 1180) { spawnFormation('waddledee', 'vee', 180); spawnFormation('watergalbros', 'single', 380); }
    // Health item before boss
    if (t === 1320) spawnHealthItem(240);

    if (t === 1450 && !bossSpawned) {
      bossWarning = 120;
      sfxBossWarn();
    }
    if (t === 1570 && !bossSpawned) {
      spawnBoss('gigantedge');
      bossSpawned = true;
    }
  } else if (stage === 3) {
    if (bossSpawned) return;
    // Stage 3: Dark Matter stage
    if (t === 100) spawnFormation('mechawaddledee', 'line', 240);
    if (t === 280) spawnFormation('hothead', 'vee', 200);
    if (t === 450) spawnHealthItem(300);
    if (t === 520) { spawnFormation('watergalbros', 'line', 150); spawnFormation('mechawaddledee', 'single', 350); }
    if (t === 720) spawnFormation('waddledee', 'vee', 280);
    if (t === 880) spawnFormation('hothead', 'line', 240);
    if (t === 950) spawnHealthItem(W / 2);
    if (t === 1050) { spawnFormation('mechawaddledee', 'diagonal', 200); spawnFormation('watergalbros', 'single', 380); }
    if (t === 1250) spawnHealthItem(200);
    if (t === 1350 && !bossSpawned) { bossWarning = 120; sfxBossWarn(); }
    if (t === 1470 && !bossSpawned) { spawnBoss('darkmatter'); bossSpawned = true; }
  } else if (stage === 4) {
    if (bossSpawned) return;
    // Stage 4: Marx stage
    if (t === 100) spawnFormation('hothead', 'line', 240);
    if (t === 280) { spawnFormation('mechawaddledee', 'vee', 180); spawnFormation('watergalbros', 'single', 400); }

    if (t === 1200) spawnHealthItem(300);
    if (t === 1300 && !bossSpawned) { bossWarning = 120; sfxBossWarn(); }
    if (t === 1420 && !bossSpawned) { spawnBoss('marx'); bossSpawned = true; }
  } else if (stage === 5) {
    if (bossSpawned) return;
    // Stage 5: Zero (final) stage
    if (t === 100) { spawnFormation('mechawaddledee', 'vee', 240); spawnFormation('hothead', 'single', 100); }
    if (t === 300) { spawnFormation('watergalbros', 'line', 200); spawnFormation('mechawaddledee', 'single', 400); }
    if (t === 450) spawnHealthItem(240);
    if (t === 550) { spawnFormation('hothead', 'vee', 300); spawnFormation('waddledee', 'line', 150); }

    if (t === 1370 && !bossSpawned) { spawnBoss('zero'); bossSpawned = true; }
  }
}

// ---- Player Update ----
function updatePlayer() {
  // Movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  player.x += dx * player.speed;
  player.y += dy * player.speed;
  player.x = clamp(player.x, 22, W - 22);
  player.y = clamp(player.y, 22, H - 22);

  // Inhale
  player.inhaling = keys['KeyX'];
  if (player.inhaling && frame % 8 === 0) sfxInhale();

  // Shooting
  if (player.shootTimer > 0) player.shootTimer--;

  if ((keys['KeyZ'] || keys['Space']) && !player.inhaling && player.shootTimer <= 0) {
    if (player.ability === 'fire') {
      bullets.push({
        x: player.x, y: player.y - 20, vx: 0, vy: -6,
        type: 'fire', damage: 2, w: 12, h: 12, size: 7, pierce: true
      });
      player.shootTimer = 15;
      sfxFireShoot();
    } else if (player.ability === 'water') {
      for (let i = -1; i <= 1; i++) {
        bullets.push({
          x: player.x + i * 8, y: player.y - 18,
          vx: i * 1.5, vy: -7,
          type: 'water', damage: 1, w: 8, h: 8, size: 4, pierce: false
        });
      }
      player.shootTimer = 12;
      sfxWaterShoot();
    } else {
      bullets.push({
        x: player.x, y: player.y - 20, vx: 0, vy: -9,
        type: 'laser', damage: 1, w: 4, h: 12, pierce: false
      });
      player.shootTimer = player.shootCooldown;
      sfxShoot();
    }
  }

  // Invincibility
  if (player.invincible > 0) player.invincible--;
}

// ---- Bullets Update ----
function updateBullets() {
  // Player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) {
      bullets.splice(i, 1);
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) {
      enemyBullets.splice(i, 1);
    }
  }
}

// ---- Enemies Update ----
function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.moveTimer++;

    // Movement patterns
    if (e.movePattern === 0) {
      // Straight down with slight wave
      e.x += Math.sin(e.moveTimer * 0.03) * 0.5;
      e.y += e.vy;
    } else if (e.movePattern === 1) {
      // Zigzag
      e.x += Math.sin(e.moveTimer * 0.05) * 2;
      e.y += e.vy;
    } else {
      // Curved
      e.x += e.vx + Math.cos(e.moveTimer * 0.02) * 1.5;
      e.y += e.vy * 0.8;
    }

    // Shooting
    if (e.shootRate > 0) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate + randInt(-10, 10);
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        const speed = 1.5;

        if (e.type === 'hothead') {
          enemyBullets.push({
            x: e.x, y: e.y + 10, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            type: 'enemyFire', w: 10, h: 10, size: 5
          });
        } else if (e.type === 'watergalbros') {
          enemyBullets.push({
            x: e.x, y: e.y + 10, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            type: 'enemyWater', w: 8, h: 8, size: 4
          });
        } else if (e.type === 'mechawaddledee') {
          enemyBullets.push({
            x: e.x, y: e.y + 10, vx: 0, vy: 2,
            type: 'enemyFire', w: 8, h: 8, size: 4
          });
        }
      }
    }

    // Inhale suction
    if (player.inhaling) {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const d = Math.hypot(dx, dy);
      const inhaleLen = 200;
      const inhaleWidth = 80;

      // Check if enemy is within inhale cone
      if (e.y < player.y && d < inhaleLen + 20) {
        const relX = Math.abs(e.x - player.x);
        const relY = player.y - e.y;
        const maxWidth = 10 + (inhaleWidth - 10) * (relY / inhaleLen);

        if (relX < maxWidth) {
          // Pull toward Kirby
          const pullStrength = 5.5;
          e.x += (dx / d) * pullStrength;
          e.y += (dy / d) * pullStrength;

          // Absorbed!
          if (d < 25) {
            // Grant ability
            if (e.ability !== 'none') {
              player.ability = e.ability;
              sfxAbility();
              spawnParticles(player.x, player.y, e.ability === 'fire' ? '#FF6600' : '#44AAFF', 15, 3, 20);
            }
            score += e.score;
            spawnStar(e.x, e.y);
            enemies.splice(i, 1);
            continue;
          }
        }
      }
    }

    // Remove if off screen
    if (e.y > H + 40 || e.x < -40 || e.x > W + 40) {
      enemies.splice(i, 1);
    }
  }
}

// ---- Boss Update ----
function updateBoss() {
  if (!boss) return;
  const b = boss;

  // Phase check
  if (b.hp <= b.maxHp * 0.4 && b.phase === 1) {
    b.phase = 2;
    screenShake(6, 20);
    spawnParticles(b.x, b.y, '#FF4444', 20, 4, 25);
    playTone(150, 0.5, 'sawtooth', 0.1);
  }

  if (b.attackAnim > 0) b.attackAnim--;

  // State machine
  if (b.state === 'enter') {
    b.y += 2;
    if (b.y >= b.targetY) {
      b.y = b.targetY;
      b.state = 'idle';
      b.stateTimer = 80;
    }
    return;
  }

  b.stateTimer--;

  if (b.type === 'metaknight') {
    updateMetaKnight(b);
  } else if (b.type === 'gigantedge') {
    updateGigantEdge(b);
  } else if (b.type === 'darkmatter') {
    updateDarkMatter(b);
  } else if (b.type === 'marx') {
    updateMarx(b);
  } else if (b.type === 'zero') {
    updateZero(b);
  }
}

function updateMetaKnight(b) {
  const spd = b.phase === 2 ? 3.5 : 2.5;
  const returnSpd = b.phase === 2 ? 4 : 3;

  if (b.state === 'return') {
    // Fly back to idle area at constant speed
    const tx = W / 2, ty = b.targetY;
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d > returnSpd) {
      b.x += (dx / d) * returnSpd;
      b.y += (dy / d) * returnSpd;
    } else {
      b.x = tx; b.y = ty;
      b.state = 'idle';
      b.stateTimer = 60;
    }
  } else if (b.state === 'idle') {
    // Float around
    b.x += Math.sin(frame * 0.04) * spd * 0.5;
    b.y = b.targetY + Math.sin(frame * 0.03) * 15;

    if (b.stateTimer <= 0) {
      b.attackPattern = (b.attackPattern + 1) % (b.phase === 2 ? 4 : 3);
      if (b.attackPattern === 0) {
        b.state = 'swordBeam';
        b.stateTimer = 40;
        b.attackAnim = 40;
      } else if (b.attackPattern === 1) {
        b.state = 'dash';
        b.dashTarget = { x: player.x, y: player.y - 50 };
        b.stateTimer = 80;
      } else if (b.attackPattern === 2) {
        b.state = 'multiSlash';
        b.stateTimer = 80;
        b.attackAnim = 80;
      } else {
        b.state = 'tornado';
        b.stateTimer = 100;
      }
    }
  } else if (b.state === 'swordBeam') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer === 30) {
      const count = b.phase === 2 ? 3 : 2;
      for (let i = 0; i < count; i++) {
        const angle = Math.PI / 2 + (i - (count - 1) / 2) * 0.35;
        enemyBullets.push({
          x: b.x, y: b.y + 20,
          vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5,
          type: 'bossSword', w: 16, h: 8
        });
      }
      screenShake(3, 8);
      playTone(400, 0.15, 'sawtooth', 0.08);
    }
    if (b.stateTimer <= 0) { b.state = 'return'; }
  } else if (b.state === 'dash') {
    const dx = b.dashTarget.x - b.x;
    const dy = b.dashTarget.y - b.y;
    const d = Math.hypot(dx, dy);
    if (d > 5) {
      const dashSpd = b.phase === 2 ? 7 : 5;
      b.x += (dx / d) * dashSpd;
      b.y += (dy / d) * dashSpd;
    }
    if (b.stateTimer <= 0 || d <= 5) {
      b.attackAnim = 20;
      for (let i = 0; i < (b.phase === 2 ? 5 : 3); i++) {
        const angle = (i / (b.phase === 2 ? 5 : 3)) * Math.PI * 2;
        enemyBullets.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * 3.5, vy: Math.sin(angle) * 3.5,
          type: 'bossSword', w: 14, h: 8
        });
      }
      screenShake(4, 10);
      playTone(300, 0.2, 'square', 0.08);
      b.state = 'return';
    }
  } else if (b.state === 'multiSlash') {
    b.attackAnim = b.stateTimer;
    b.x += Math.sin(frame * 0.15) * 2;
    if (b.stateTimer % 25 === 0) {
      const angle = Math.atan2(player.y - b.y, player.x - b.x);
      enemyBullets.push({
        x: b.x, y: b.y,
        vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5,
        type: 'bossSword', w: 14, h: 8
      });
      playTone(500, 0.08, 'square', 0.05);
    }
    if (b.stateTimer <= 0) { b.state = 'return'; }
  } else if (b.state === 'tornado') {
    b.attackAnim = b.stateTimer;
    const cx = W / 2, cy = 150;
    const angle = (100 - b.stateTimer) * 0.08;
    const orbX = cx + Math.cos(angle) * 100;
    const orbY = cy + Math.sin(angle) * 50;
    b.x += (orbX - b.x) * 0.12;
    b.y += (orbY - b.y) * 0.12;

    if (b.stateTimer % 12 === 0) {
      enemyBullets.push({
        x: b.x, y: b.y,
        vx: Math.cos(angle + Math.PI) * 3, vy: Math.sin(angle + Math.PI) * 3 + 2,
        type: 'bossSword', w: 12, h: 8
      });
    }
    if (b.stateTimer <= 0) { b.state = 'return'; }
  }
}

function updateGigantEdge(b) {
  const spd = b.phase === 2 ? 2 : 1.5;
  const returnSpd = b.phase === 2 ? 3.5 : 2.5;

  if (b.state === 'return') {
    // Fly back to idle area at constant speed
    const tx = W / 2, ty = b.targetY;
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d > returnSpd) {
      b.x += (dx / d) * returnSpd;
      b.y += (dy / d) * returnSpd;
    } else {
      b.x = tx; b.y = ty;
      b.state = 'idle';
      b.stateTimer = 60;
    }
  } else if (b.state === 'idle') {
    // Slow side-to-side movement
    b.x += b.moveDir * spd;
    if (b.x < 60 || b.x > W - 60) b.moveDir *= -1;
    b.y = b.targetY + Math.sin(frame * 0.02) * 8;

    if (b.stateTimer <= 0) {
      b.attackPattern = (b.attackPattern + 1) % (b.phase === 2 ? 4 : 3);
      if (b.attackPattern === 0) {
        b.state = 'swordSlam';
        b.stateTimer = 80;
        b.attackAnim = 60;
      } else if (b.attackPattern === 1) {
        b.state = 'shieldBash';
        b.stateTimer = 80;
      } else if (b.attackPattern === 2) {
        b.state = 'rockThrow';
        b.stateTimer = 90;
      } else {
        b.state = 'charge';
        b.stateTimer = 100;
      }
    }
  } else if (b.state === 'swordSlam') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer === 40) {
      screenShake(8, 15);
      playTone(80, 0.4, 'sawtooth', 0.12);
      const count = b.phase === 2 ? 5 : 3;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI - Math.PI;
        enemyBullets.push({
          x: b.x + 30, y: b.y + 20,
          vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 2 + 2,
          type: 'bossRock', w: 14, h: 14, size: 7
        });
      }
    }
    if (b.stateTimer <= 0) { b.state = 'return'; }
  } else if (b.state === 'shieldBash') {
    b.attackAnim = Math.max(0, b.stateTimer - 40);
    if (b.stateTimer > 40) {
      const dx = player.x - b.x;
      b.x += Math.sign(dx) * (b.phase === 2 ? 4 : 3);
    }
    if (b.stateTimer === 40) {
      screenShake(5, 12);
      playTone(120, 0.3, 'square', 0.1);
      for (let i = -1; i <= 1; i++) {
        enemyBullets.push({
          x: b.x - 30, y: b.y + i * 20,
          vx: -2.5, vy: i * 0.5 + 1,
          type: 'bossRock', w: 12, h: 12, size: 6
        });
        enemyBullets.push({
          x: b.x + 30, y: b.y + i * 20,
          vx: 2.5, vy: i * 0.5 + 1,
          type: 'bossRock', w: 12, h: 12, size: 6
        });
      }
    }
    if (b.stateTimer <= 0) { b.state = 'return'; }
  } else if (b.state === 'rockThrow') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer % (b.phase === 2 ? 20 : 30) === 0 && b.stateTimer > 10) {
      const angle = Math.atan2(player.y - b.y, player.x - b.x);
      enemyBullets.push({
        x: b.x, y: b.y + 30,
        vx: Math.cos(angle) * 3.5, vy: Math.sin(angle) * 3.5,
        type: 'bossRock', w: 18, h: 18, size: 9
      });
      playTone(150, 0.1, 'sawtooth', 0.06);
    }
    if (b.stateTimer <= 0) { b.state = 'return'; }
  } else if (b.state === 'charge') {
    b.attackAnim = b.stateTimer;
    const dx = player.x - b.x;
    const dy = player.y - 50 - b.y;
    const d = Math.hypot(dx, dy);
    if (d > 10) {
      b.x += (dx / d) * (b.phase === 2 ? 5 : 3.5);
      b.y += (dy / d) * (b.phase === 2 ? 5 : 3.5);
    }
    if (b.stateTimer % 16 === 0) {
      enemyBullets.push({
        x: b.x + rand(-20, 20), y: b.y + 30,
        vx: rand(-1, 1), vy: 2.5,
        type: 'bossRock', w: 12, h: 12, size: 6
      });
    }
    if (b.stateTimer <= 0) {
      b.state = 'return';
    }
  }
}

function updateDarkMatter(b) {
  const spd = b.phase === 2 ? 3 : 2;
  const returnSpd = b.phase === 2 ? 3.5 : 2.5;

  if (b.state === 'return') {
    const tx = W / 2, ty = b.targetY;
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d > returnSpd) {
      b.x += (dx / d) * returnSpd;
      b.y += (dy / d) * returnSpd;
    } else {
      b.x = tx; b.y = ty;
      b.state = 'idle';
      b.stateTimer = 60;
    }
  } else if (b.state === 'idle') {
    b.x += Math.sin(frame * 0.03) * spd;
    b.y = b.targetY + Math.sin(frame * 0.025) * 12;

    if (b.stateTimer <= 0) {
      b.attackPattern = (b.attackPattern + 1) % (b.phase === 2 ? 4 : 3);
      if (b.attackPattern === 0) {
        b.state = 'darkOrb';
        b.stateTimer = 60;
        b.attackAnim = 60;
      } else if (b.attackPattern === 1) {
        b.state = 'beamSweep';
        b.stateTimer = 80;
        b.attackAnim = 80;
      } else if (b.attackPattern === 2) {
        b.state = 'scatter';
        b.stateTimer = 70;
        b.attackAnim = 70;
      } else {
        b.state = 'voidPulse';
        b.stateTimer = 90;
        b.attackAnim = 90;
      }
    }
  } else if (b.state === 'darkOrb') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer % (b.phase === 2 ? 15 : 20) === 0 && b.stateTimer > 10) {
      const angle = Math.atan2(player.y - b.y, player.x - b.x);
      enemyBullets.push({
        x: b.x, y: b.y + 20,
        vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
        type: 'darkOrb', w: 12, h: 12, size: 6
      });
      playTone(200, 0.1, 'sine', 0.06);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'beamSweep') {
    b.attackAnim = b.stateTimer;
    const sweepAngle = ((80 - b.stateTimer) / 80) * Math.PI;
    b.x = W / 2 + Math.cos(sweepAngle) * 120;
    if (b.stateTimer % 8 === 0) {
      enemyBullets.push({
        x: b.x, y: b.y + 25,
        vx: 0, vy: 4.5,
        type: 'darkBeam', w: 30, h: 6
      });
      playTone(300, 0.06, 'sawtooth', 0.04);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'scatter') {
    b.attackAnim = b.stateTimer;
    if (b.stateTimer === 50 || b.stateTimer === 30 || (b.phase === 2 && b.stateTimer === 15)) {
      const count = b.phase === 2 ? 10 : 7;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        enemyBullets.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
          type: 'darkOrb', w: 10, h: 10, size: 5
        });
      }
      screenShake(4, 10);
      playTone(150, 0.15, 'sawtooth', 0.08);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  } else if (b.state === 'voidPulse') {
    b.attackAnim = b.stateTimer;
    b.x += (W / 2 - b.x) * 0.05;
    b.y += (b.targetY - b.y) * 0.05;
    if (b.stateTimer === 50 || b.stateTimer === 25) {
      const count = 14;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        enemyBullets.push({
          x: b.x, y: b.y,
          vx: Math.cos(angle) * 2.5, vy: Math.sin(angle) * 2.5,
          type: 'voidPulse', w: 20, h: 20, size: 10
        });
      }
      screenShake(8, 20);
      playTone(80, 0.4, 'sawtooth', 0.12);
    }
    if (b.stateTimer <= 0) b.state = 'return';
  }
}

function updateMarx(b) {

  if (b.state === 'return') {

    const dx = tx - b.x, dy = ty - b.y;

    if (d > returnSpd) {

      b.y += (dy / d) * returnSpd;

  } else if (b.state === 'idle') {
    b.x += Math.sin(frame * 0.05) * spd * 0.8;
    b.y = b.targetY + Math.sin(frame * 0.035) * 12;

    if (b.stateTimer <= 0) {

      if (b.attackPattern === 0) {
        b.state = 'iceBomb';
        b.stateTimer = 70;

      } else if (b.attackPattern === 1) {

        b.stateTimer = 60;
        b.attackAnim = 60;
      } else if (b.attackPattern === 2) {
        b.state = 'arrowRain';
