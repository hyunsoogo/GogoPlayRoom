    // ==========================================
    // AUDIO
    // ==========================================
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // ==========================================
    // BGM - Procedural driving music
    // ==========================================
    let bgmPlaying = false;
    let bgmNodes = [];
    let bgmGain = null;
    let bgmBassOsc = null;
    let bgmNextBeat = 0;
    let bgmBPM = 130;
    let bgmBeatIndex = 0;
    let bgmInterval = null;

    // Upbeat driving melody in E minor / G major
    const BGM_BASS_NOTES = [164.81, 164.81, 196.00, 196.00, 146.83, 146.83, 130.81, 130.81]; // E3, G3, D3, C3
    const BGM_MELODY_NOTES = [
        659.25, 587.33, 523.25, 587.33,  // E5 D5 C5 D5
        493.88, 523.25, 587.33, 659.25,  // B4 C5 D5 E5
        783.99, 659.25, 587.33, 523.25,  // G5 E5 D5 C5
        493.88, 523.25, 659.25, 587.33   // B4 C5 E5 D5
    ];

    function startBGM() {
        if (bgmPlaying || !audioCtx) return;
        bgmPlaying = true;
        bgmBeatIndex = 0;

        // Master gain for BGM
        bgmGain = audioCtx.createGain();
        bgmGain.gain.value = 0.18;
        bgmGain.connect(audioCtx.destination);

        // Pad: sustained warm chord
        const padGain = audioCtx.createGain();
        padGain.gain.value = 0.06;
        padGain.connect(bgmGain);

        const padNotes = [164.81, 196.00, 246.94, 329.63]; // E3 G3 B3 E4
        padNotes.forEach(freq => {
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(padGain);
            osc.start();
            bgmNodes.push(osc);
        });
        bgmNodes.push(padGain);

        // Beat scheduling
        const beatDuration = 60 / bgmBPM;

        bgmInterval = setInterval(() => {
            if (!audioCtx || !bgmPlaying) return;
            const now = audioCtx.currentTime;

            // Bass line
            const bassNote = BGM_BASS_NOTES[bgmBeatIndex % BGM_BASS_NOTES.length];
            const bassOsc = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            bassOsc.type = 'sawtooth';
            bassOsc.frequency.value = bassNote;
            bassGain.gain.setValueAtTime(0.12, now);
            bassGain.gain.exponentialRampToValueAtTime(0.01, now + beatDuration * 0.8);
            bassOsc.connect(bassGain);
            bassGain.connect(bgmGain);
            bassOsc.start(now);
            bassOsc.stop(now + beatDuration * 0.9);

            // Hi-hat on every beat
            const hatBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
            const hatData = hatBuf.getChannelData(0);
            for (let i = 0; i < hatData.length; i++) hatData[i] = (Math.random() * 2 - 1) * 0.3;
            const hatSrc = audioCtx.createBufferSource();
            hatSrc.buffer = hatBuf;
            const hatGain = audioCtx.createGain();
            hatGain.gain.setValueAtTime(0.08, now);
            hatGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            hatSrc.connect(hatGain);
            hatGain.connect(bgmGain);
            hatSrc.start(now);

            // Kick on beats 0, 2, 4, 6
            if (bgmBeatIndex % 2 === 0) {
                const kickOsc = audioCtx.createOscillator();
                const kickGain = audioCtx.createGain();
                kickOsc.type = 'sine';
                kickOsc.frequency.setValueAtTime(150, now);
                kickOsc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                kickGain.gain.setValueAtTime(0.2, now);
                kickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                kickOsc.connect(kickGain);
                kickGain.connect(bgmGain);
                kickOsc.start(now);
                kickOsc.stop(now + 0.2);
            }

            // Snare on beats 1, 3, 5, 7
            if (bgmBeatIndex % 2 === 1) {
                const snareBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                const snareData = snareBuf.getChannelData(0);
                for (let i = 0; i < snareData.length; i++) snareData[i] = (Math.random() * 2 - 1);
                const snareSrc = audioCtx.createBufferSource();
                snareSrc.buffer = snareBuf;
                const snareGain = audioCtx.createGain();
                snareGain.gain.setValueAtTime(0.1, now);
                snareGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                snareSrc.connect(snareGain);
                snareGain.connect(bgmGain);
                snareSrc.start(now);
            }

            // Melody every 2 beats
            if (bgmBeatIndex % 2 === 0) {
                const melodyNote = BGM_MELODY_NOTES[Math.floor(bgmBeatIndex / 2) % BGM_MELODY_NOTES.length];
                const melOsc = audioCtx.createOscillator();
                const melGain = audioCtx.createGain();
                melOsc.type = 'square';
                melOsc.frequency.value = melodyNote;
                melGain.gain.setValueAtTime(0.04, now);
                melGain.gain.setValueAtTime(0.04, now + beatDuration * 1.5);
                melGain.gain.exponentialRampToValueAtTime(0.001, now + beatDuration * 1.9);
                melOsc.connect(melGain);
                melGain.connect(bgmGain);
                melOsc.start(now);
                melOsc.stop(now + beatDuration * 2);
            }

            bgmBeatIndex++;
        }, beatDuration * 1000);
    }

    function stopBGM() {
        bgmPlaying = false;
        if (bgmInterval) {
            clearInterval(bgmInterval);
            bgmInterval = null;
        }
        bgmNodes.forEach(n => {
            try { n.stop(); } catch(e) {}
            try { n.disconnect(); } catch(e) {}
        });
        bgmNodes = [];
        if (bgmGain) {
            try { bgmGain.disconnect(); } catch(e) {}
            bgmGain = null;
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            if (type === 'coin') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.linearRampToValueAtTime(1320, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'crash') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);

                // Noise burst
                const bufferSize = audioCtx.sampleRate * 0.3;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                const noise = audioCtx.createBufferSource();
                const noiseGain = audioCtx.createGain();
                noise.buffer = buffer;
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.2, now);
                noiseGain.gain.linearRampToValueAtTime(0, now + 0.3);
                noise.start(now);
            } else if (type === 'bomb') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(25, now + 0.5);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let k = 0; k < bufferSize; k++) data[k] = (Math.random() * 2 - 1) * Math.pow(1 - k / bufferSize, 2);
                const noise = audioCtx.createBufferSource();
                const noiseGain = audioCtx.createGain();
                noise.buffer = buffer;
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.25, now);
                noiseGain.gain.linearRampToValueAtTime(0, now + 0.5);
                noise.start(now);
            } else if (type === 'boost') {
                // Layer 1: Low rumble base
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(60, now);
                osc1.frequency.exponentialRampToValueAtTime(120, now + 0.15);
                osc1.frequency.exponentialRampToValueAtTime(180, now + 0.6);
                osc1.frequency.exponentialRampToValueAtTime(140, now + 0.9);
                gain1.gain.setValueAtTime(0, now);
                gain1.gain.linearRampToValueAtTime(0.13, now + 0.08);
                gain1.gain.setValueAtTime(0.13, now + 0.5);
                gain1.gain.linearRampToValueAtTime(0, now + 0.9);
                osc1.start(now);
                osc1.stop(now + 0.9);

                // Layer 2: Mid roar sweep
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(100, now);
                osc2.frequency.exponentialRampToValueAtTime(300, now + 0.2);
                osc2.frequency.exponentialRampToValueAtTime(400, now + 0.6);
                osc2.frequency.exponentialRampToValueAtTime(250, now + 0.9);
                gain2.gain.setValueAtTime(0, now);
                gain2.gain.linearRampToValueAtTime(0.10, now + 0.1);
                gain2.gain.setValueAtTime(0.10, now + 0.5);
                gain2.gain.linearRampToValueAtTime(0, now + 0.9);
                osc2.start(now);
                osc2.stop(now + 0.9);

                // Layer 3: Vibrato LFO for roaring wobble
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.type = 'sine';
                lfo.frequency.setValueAtTime(18, now);
                lfo.frequency.linearRampToValueAtTime(12, now + 0.9);
                lfoGain.gain.setValueAtTime(20, now);
                lfo.connect(lfoGain);
                lfoGain.connect(osc1.frequency);
                lfoGain.connect(osc2.frequency);
                lfo.start(now);
                lfo.stop(now + 0.9);

                // Layer 4: Whoosh noise
                const bufSize = audioCtx.sampleRate * 0.7;
                const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    const t = i / bufSize;
                    const env = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;
                    d[i] = (Math.random() * 2 - 1) * env * 0.5;
                }
                const noiseSrc = audioCtx.createBufferSource();
                const noiseGain = audioCtx.createGain();
                noiseSrc.buffer = buf;
                noiseSrc.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.09, now);
                noiseSrc.start(now);
            } else if (type === 'boostEnd') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'bossWarning') {
                // Low siren sound
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.linearRampToValueAtTime(120, now + 0.3);
                osc.frequency.linearRampToValueAtTime(80, now + 0.6);
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.linearRampToValueAtTime(0.12, now + 0.3);
                gain.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'bossHit') {
                // Metal impact
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.25);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
                // Noise burst
                const bufferSize = audioCtx.sampleRate * 0.2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                const noise = audioCtx.createBufferSource();
                const noiseGain = audioCtx.createGain();
                noise.buffer = buffer;
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.2, now);
                noiseGain.gain.linearRampToValueAtTime(0, now + 0.2);
                noise.start(now);
            } else if (type === 'bossDefeat') {
                // Victory chord (major triad)
                [523.25, 659.25, 783.99].forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.1);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.15, now + idx * 0.1 + 0.05);
                    gain.gain.setValueAtTime(0.15, now + 0.6);
                    gain.gain.linearRampToValueAtTime(0, now + 1.2);
                    osc.start(now + idx * 0.1);
                    osc.stop(now + 1.2);
                });
            } else if (type === 'missileFire') {
                // Rocket launch whoosh
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.8);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.3);
                gain.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
                // Noise burst for exhaust
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize) * 0.5;
                const noise = audioCtx.createBufferSource();
                const noiseGain = audioCtx.createGain();
                noise.buffer = buffer;
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.15, now);
                noiseGain.gain.linearRampToValueAtTime(0, now + 0.5);
                noise.start(now);
            } else if (type === 'jump') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.exponentialRampToValueAtTime(700, now + 0.15);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'lane') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(0.06, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            }
        } catch (e) {}
    }

    // ==========================================
    // INPUT
    // ==========================================
    function setupInput() {
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'playing') return;
            const code = e.code;
            const key = e.key;
            if (key === 'ArrowLeft' || code === 'KeyA') {
                changeLane(-1);
            } else if (key === 'ArrowRight' || code === 'KeyD') {
                changeLane(1);
            } else if (key === 'ArrowUp' || code === 'KeyW') {
                e.preventDefault();
                performJump();
            } else if (key === ' ') {
                e.preventDefault();
                if (!boostActive && boostFuel > 5) activateBoost();
            } else if (code === 'KeyZ') {
                fireMissile();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                deactivateBoost();
            }
        });

        // Mobile boost button
        const boostBtnEl = document.getElementById('boostBtn');
        boostBtnEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing' && !boostActive && boostFuel > 5) activateBoost();
        }, { passive: false });
        boostBtnEl.addEventListener('touchend', (e) => {
            e.preventDefault();
            deactivateBoost();
        }, { passive: false });

        // Touch controls
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (gameState !== 'playing') return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
                changeLane(dx > 0 ? 1 : -1);
            } else if (dy < -40 && Math.abs(dy) > Math.abs(dx)) {
                performJump();
            }
        }, { passive: true });
    }

    function changeLane(dir) {
        const newLane = currentLane + dir;
        if (newLane < 0 || newLane > 2) return;
        currentLane = newLane;
        targetX = LANE_POSITIONS[currentLane];
        playSound('lane');
    }

    function activateBoost() {
        if (boostActive || boostFuel <= 5) return;
        boostActive = true;
        playSound('boost');
        boostOverlay.style.opacity = '1';
        boostGaugeEl.classList.add('active');
    }

    function deactivateBoost() {
        if (!boostActive) return;
        boostActive = false;
        playSound('boostEnd');
        boostOverlay.style.opacity = '0';
        boostGaugeEl.classList.remove('active');
    }

    function performJump() {
        if (isJumping || playerCar.position.y > 0.1) return;
        isJumping = true;
        bombJumpVel = JUMP_VELOCITY;
        playSound('jump');
    }

    // ==========================================
    // MISSILE SYSTEM
    // ==========================================
    function updateMissileGauge() {
        const pct = (missileCharge / MISSILE_MAX_CHARGE * 100);
        missileFillEl.style.height = pct + '%';
        missileGaugeEl.classList.toggle('ready', missileCharge >= MISSILE_MAX_CHARGE);
    }

    function fireMissile() {
        if (missileCharge < MISSILE_MAX_CHARGE || missileActive) return;

        missileCharge = 0;
        updateMissileGauge();
        missileActive = true;
        playSound('missileFire');

        // Create missile mesh (large and visible)
        const missile = new THREE.Group();
        // Body
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.7, 4.0, 10);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xCC2200, metalness: 0.6, roughness: 0.3, emissive: 0x441100, emissiveIntensity: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2;
        missile.add(body);
        // Nose cone
        const noseGeo = new THREE.ConeGeometry(0.4, 1.2, 10);
        const noseMat = new THREE.MeshStandardMaterial({ color: 0xFF4400, metalness: 0.5, emissive: 0xFF2200, emissiveIntensity: 0.4 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.rotation.x = -Math.PI / 2;
        nose.position.z = -2.6;
        missile.add(nose);
        // Fins
        const finGeo = new THREE.BoxGeometry(1.4, 0.08, 0.8);
        const finMat = new THREE.MeshStandardMaterial({ color: 0x881100 });
        const fin1 = new THREE.Mesh(finGeo, finMat);
        fin1.position.z = 1.6;
        missile.add(fin1);
        const fin2 = new THREE.Mesh(finGeo.clone(), finMat);
        fin2.rotation.z = Math.PI / 2;
        fin2.position.z = 1.6;
        missile.add(fin2);
        // Exhaust glow
        const exhaustGeo = new THREE.SphereGeometry(0.6, 8, 8);
        const exhaustMat = new THREE.MeshBasicMaterial({ color: 0xFF6600, transparent: true, opacity: 0.8 });
        const exhaust = new THREE.Mesh(exhaustGeo, exhaustMat);
        exhaust.position.z = 2.2;
        missile.add(exhaust);
        // Point light on missile
        const missileLight = new THREE.PointLight(0xFF4400, 2, 15);
        missileLight.position.z = 2.2;
        missile.add(missileLight);

        missile.position.set(playerCar.position.x, 2.0, playerCar.position.z - 3);
        missile.userData.wobbleTime = 0;
        scene.add(missile);
        missileMesh = missile;
        missileTrailParticles = [];
    }

    function updateMissile(delta) {
        if (!missileActive || !missileMesh) return;

        missileMesh.userData.wobbleTime += delta;
        const wt = missileMesh.userData.wobbleTime;

        let target;
        let hasBossTarget = bossMesh && bossActive && bossPhase === 'fighting';
        if (hasBossTarget) {
            target = bossMesh.position.clone();
            target.y += 1.5;
        } else {
            // No boss: fly forward
            target = missileMesh.position.clone();
            target.z -= 50;
        }

        const dir = new THREE.Vector3().subVectors(target, missileMesh.position);
        const dist = dir.length();
        dir.normalize();

        // Wobble offset
        const wobbleX = Math.sin(wt * 5.0) * 3.0;
        const wobbleY = Math.cos(wt * 3.7) * 2.0;
        const wobbleDir = new THREE.Vector3(wobbleX, wobbleY, 0);

        const moveDir = dir.clone().multiplyScalar(MISSILE_SPEED).add(wobbleDir);
        missileMesh.position.add(moveDir.clone().multiplyScalar(delta));

        missileMesh.lookAt(target);
        // Wobble rotation for visual effect
        missileMesh.rotation.z = Math.sin(wt * 6) * 0.3;

        // Smoke trail (small)
        if (Math.random() < 0.6) {
            const size = 0.15 + Math.random() * 0.25;
            const smoke = new THREE.Mesh(
                new THREE.SphereGeometry(size, 4, 4),
                new THREE.MeshBasicMaterial({ color: Math.random() > 0.3 ? 0x999999 : 0xFF6600, transparent: true, opacity: 0.6 })
            );
            smoke.position.copy(missileMesh.position);
            smoke.position.x += (Math.random() - 0.5) * 0.3;
            smoke.position.y += (Math.random() - 0.5) * 0.3;
            smoke.position.z += 1;
            smoke.userData = { life: 0.6 };
            scene.add(smoke);
            missileTrailParticles.push(smoke);
        }

        // Update trail particles
        for (let i = missileTrailParticles.length - 1; i >= 0; i--) {
            const p = missileTrailParticles[i];
            p.userData.life -= delta;
            p.material.opacity = Math.max(0, p.userData.life * 0.5);
            p.scale.multiplyScalar(1 + delta * 1.5);
            p.position.y += delta * 1.5;
            if (p.userData.life <= 0) {
                scene.remove(p);
                missileTrailParticles.splice(i, 1);
            }
        }

        // Hit boss or expire
        if (hasBossTarget && dist < 6) {
            missileHitBoss();
        } else if (wt > 5.0) {
            // Expire after 5 seconds if no boss hit
            createExplosion(missileMesh.position.x, missileMesh.position.y, missileMesh.position.z);
            cleanupMissile();
        }
    }

    function missileHitBoss() {
        // Big explosion at boss
        createExplosion(bossMesh.position.x, bossMesh.position.y + 2, bossMesh.position.z);
        createExplosion(bossMesh.position.x + 1, bossMesh.position.y + 1, bossMesh.position.z - 1);
        createExplosion(bossMesh.position.x - 1, bossMesh.position.y + 3, bossMesh.position.z + 1);
        playSound('bossDefeat');

        // Damage boss
        bossHP -= MISSILE_BOSS_DAMAGE;
        updateBossHPBar();
        showBossDamagePopup(MISSILE_BOSS_DAMAGE);

        // Flash screen
        flashOverlay.style.background = '#FFAA00';
        flashOverlay.style.opacity = '0.4';
        setTimeout(() => { flashOverlay.style.opacity = '0'; flashOverlay.style.background = 'red'; }, 300);

        // Boss spin animation
        if (bossHP > 0) {
            bossMesh.userData.spinTimer = 1.0;
        } else {
            startBossDefeat();
        }

        // Clean up missile
        scene.remove(missileMesh);
        missileMesh = null;
        missileActive = false;
        missileTrailParticles.forEach(p => scene.remove(p));
        missileTrailParticles = [];
    }

    function cleanupMissile() {
        if (missileMesh) {
            scene.remove(missileMesh);
            missileMesh = null;
        }
        missileActive = false;
        missileTrailParticles.forEach(p => scene.remove(p));
        missileTrailParticles = [];
    }

    // ==========================================
    // COLLISION DETECTION
    // ==========================================
    function checkCollisions() {
        if (gameState !== 'playing') return;
        const px = playerCar.position.x;
        const pz = playerCar.position.z;

        // Coins & Bombs
        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            const dx = Math.abs(coin.position.x - px);
            const dz = Math.abs(coin.position.z - pz);
            if (dx < 1.5 && dz < 1.8) {
                // Skip bomb if player is jumping high enough
                if (coin.userData.isBomb && playerCar.position.y > JUMP_INVINCIBLE_HEIGHT) {
                    continue;
                }
                if (coin.userData.isHealthPack) {
                    // Health recovery: 50~100%
                    const healAmount = Math.floor(PLAYER_MAX_HP * (0.5 + Math.random() * 0.5));
                    playerHP = Math.min(PLAYER_MAX_HP, playerHP + healAmount);
                    updateHPBar();
                    playSound('coin');
                    showScorePopup(coin, healAmount);
                    // Green flash
                    flashOverlay.style.background = '#44FF44';
                    flashOverlay.style.opacity = '0.3';
                    setTimeout(() => { flashOverlay.style.opacity = '0'; flashOverlay.style.background = 'red'; }, 300);
                    scene.remove(coin);
                    coins.splice(i, 1);
                    continue;
                } else if (coin.userData.isBomb) {
                    // Bomb damages HP slightly (3%)
                    playerHP = Math.max(0, playerHP - 3);
                    updateHPBar();
                    if (playerHP <= 0) {
                        startCrash(coin);
                        return;
                    }
                    // Bomb hit! Sonic-style coin scatter
                    const lostCoins = Math.min(Math.floor(score / COIN_VALUE), 10);
                    score = Math.max(0, score - BOMB_PENALTY);
                    updateScoreUI();
                    showScorePopup(coin, -BOMB_PENALTY);
                    playSound('bomb');
                    createExplosion(coin.position.x, coin.position.y, coin.position.z);
                    // Scatter coins from the player (Sonic ring loss)
                    if (lostCoins > 0) {
                        createCoinScatter(px, 1.5, pz, lostCoins);
                    }
                    // Charge missile gauge
                    missileCharge = Math.min(MISSILE_MAX_CHARGE, missileCharge + MISSILE_CHARGE_PER_BOMB);
                    updateMissileGauge();
                    // Car jumps from bomb blast
                    bombJumpVel = 12;
                    flashOverlay.style.background = '#FF4400';
                    flashOverlay.style.opacity = '0.35';
                    setTimeout(() => { flashOverlay.style.opacity = '0'; flashOverlay.style.background = 'red'; }, 250);
                } else {
                    // Coin collected
                    coinsCollected++;
                    missileCharge = Math.min(MISSILE_MAX_CHARGE, missileCharge + 2);
                    updateMissileGauge();
                    const pts = boostActive ? COIN_VALUE * 2 : COIN_VALUE;
                    score += pts;
                    updateScoreUI();
                    showScorePopup(coin, pts);
                    playSound('coin');
                }
                scene.remove(coin);
                coins.splice(i, 1);
            }
        }

        // Obstacles → HP damage (disabled during boss fight, skip if jumping high or invincible)
        if (!bossActive && playerCar.position.y < JUMP_INVINCIBLE_HEIGHT && invincibleTimer <= 0) {
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const dx = Math.abs(obs.position.x - px);
                const dz = Math.abs(obs.position.z - pz);
                if (dx < 1.8 && dz < 3.5) {
                    playerHP -= PLAYER_HIT_DAMAGE;
                    updateHPBar();
                    if (playerHP <= 0) {
                        playerHP = 0;
                        updateHPBar();
                        startCrash(obs);
                        return;
                    }
                    // Not dead: knockback + invincibility
                    hitKnockback(obs);
                    return;
                }
            }
        }
    }

    // ==========================================
    // UI
    // ==========================================
    function updateScoreUI() {
        scoreValueEl.textContent = score;
        scoreValueEl.classList.add('flash');
        setTimeout(() => scoreValueEl.classList.remove('flash'), 100);
    }

    function showScorePopup(obj, points) {
        const vec = new THREE.Vector3();
        obj.getWorldPosition(vec);
        vec.project(camera);
        const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;

        const popup = document.createElement('div');
        popup.className = 'score-popup';
        if (points < 0) {
            popup.textContent = points;
            popup.classList.add('bomb');
        } else {
            popup.textContent = '+' + points;
            if (points > COIN_VALUE) popup.style.color = '#00DDFF';
        }
        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 600);
    }

    // ==========================================
    // BOSS SYSTEM
    // ==========================================
    function checkBossTrigger() {
        if (bossActive || bossPhase !== 'none') return;
        const distToNext = nextBossDist - distanceTraveled;

        if (distToNext <= 0) {
            // Overshot warning zone — spawn immediately
            spawnBoss();
        } else if (distToNext <= BOSS_WARNING_DISTANCE) {
            bossPhase = 'warning';
            bossWarningTimer = 0;
            bossWarningEl.style.display = 'block';
            playSound('bossWarning');
        }
    }

    function spawnBoss() {
        bossLevel++;
        bossMaxHP = BOSS_BASE_HP + (bossLevel - 1) * BOSS_HP_SCALE;
        bossHP = bossMaxHP;
        bossActive = true;
        bossPhase = 'approaching';
        bossCurrentLane = 1;
        bossTargetX = LANE_POSITIONS[bossCurrentLane];
        bossLaneSwitchTimer = BOSS_LANE_SWITCH_INTERVAL;
        bossHitCooldown = 0;
        bossDefeatTimer = 0;

        // Remove existing obstacles
        obstacles.forEach(o => scene.remove(o));
        obstacles.length = 0;

        // Create boss mesh
        bossMesh = createBossModel();
        bossMesh.position.set(LANE_POSITIONS[bossCurrentLane], 0, BOSS_SPAWN_Z);
        scene.add(bossMesh);

        // Show HP bar
        bossHPNameEl.textContent = 'BOSS LV.' + bossLevel;
        bossHPBarEl.style.display = 'block';
        updateBossHPBar();

        // Hide warning
        bossWarningEl.style.display = 'none';
    }

    function updateBossHPBar() {
        const pct = Math.max(0, bossHP / bossMaxHP * 100);
        bossHPFillEl.style.width = pct + '%';
        bossHPLabelEl.textContent = Math.max(0, bossHP) + ' / ' + bossMaxHP;
    }

    function updateBoss(delta, moveDist) {
        if (bossPhase === 'warning') {
            bossWarningTimer += delta;
            // Pulse warning sound
            if (bossWarningTimer > 0.6) {
                bossWarningTimer = 0;
                playSound('bossWarning');
            }
            // Check if we reached boss distance
            if (distanceTraveled >= nextBossDist) {
                spawnBoss();
            }
            return;
        }

        if (!bossMesh) return;
        bossHitCooldown = Math.max(0, bossHitCooldown - delta);

        if (bossPhase === 'approaching') {
            // Boss moves from far to fight position
            bossMesh.position.z += moveDist; // move with road
            const targetZ = BOSS_FIGHT_Z;
            bossMesh.position.z += (targetZ - bossMesh.position.z) * 0.03;
            if (Math.abs(bossMesh.position.z - targetZ) < 2) {
                bossMesh.position.z = targetZ;
                bossPhase = 'fighting';
            }
            // Smooth X transition
            bossMesh.position.x += (bossTargetX - bossMesh.position.x) * 0.1;
            return;
        }

        if (bossPhase === 'fighting') {
            // Keep boss at fixed distance from player (moves with road)
            // When boosting, boss is closer (easier to ram)
            const fightZ = boostActive ? BOSS_FIGHT_Z * 0.35 : BOSS_FIGHT_Z;
            bossMesh.position.z += moveDist;
            bossMesh.position.z += (fightZ - bossMesh.position.z) * 0.05;

            // Lane switching AI
            bossLaneSwitchTimer -= delta;
            if (bossLaneSwitchTimer <= 0) {
                bossLaneSwitchTimer = BOSS_LANE_SWITCH_INTERVAL * (0.7 + Math.random() * 0.6);
                if (Math.random() < 0.6) {
                    // Track player
                    bossCurrentLane = currentLane;
                } else {
                    // Random lane
                    bossCurrentLane = Math.floor(Math.random() * 3);
                }
                bossTargetX = LANE_POSITIONS[bossCurrentLane];
            }
            bossMesh.position.x += (bossTargetX - bossMesh.position.x) * 0.08;

            // Missile spin animation
            if (bossMesh.userData.spinTimer > 0) {
                bossMesh.userData.spinTimer -= delta;
                bossMesh.rotation.y += Math.PI * 4 * delta;
                bossMesh.position.y = 1.5 * Math.sin(bossMesh.userData.spinTimer * Math.PI);
                if (bossMesh.userData.spinTimer <= 0) {
                    bossMesh.rotation.y = 0;
                    bossMesh.position.y = 0;
                    bossMesh.userData.spinTimer = 0;
                }
            }

            // Pulse warning lights
            const pulseVal = Math.sin(clock.elapsedTime * 8) * 0.5 + 0.5;
            bossMesh.children.forEach(child => {
                if (child.material && child.material.emissive &&
                    child.material.emissiveIntensity > 0.5 && child.material.color.r > 0.9) {
                    child.material.emissiveIntensity = 0.4 + pulseVal * 0.6;
                }
            });

            // Check collision
            checkBossCollision();
            return;
        }

        if (bossPhase === 'defeated') {
            bossDefeatTimer -= delta;
            // Keep boss moving with road so it doesn't drift into player
            bossMesh.position.z += moveDist;
            // Explosion and sinking
            bossMesh.position.y -= 3 * delta;
            bossMesh.rotation.x += 1.5 * delta;
            bossMesh.rotation.z += 2 * delta;

            // Spawn explosion particles periodically
            if (Math.random() < 0.3) {
                createExplosion(
                    bossMesh.position.x + (Math.random() - 0.5) * 3,
                    bossMesh.position.y + 1 + Math.random() * 2,
                    bossMesh.position.z + (Math.random() - 0.5) * 4
                );
            }

            if (bossDefeatTimer <= 0) {
                finishBossDefeat();
            }
            return;
        }
    }

    function checkBossCollision() {
        if (!bossMesh || bossPhase !== 'fighting' || bossHitCooldown > 0) return;
        const px = playerCar.position.x;
        const pz = playerCar.position.z;
        const bx = bossMesh.position.x;
        const bz = bossMesh.position.z;

        const dx = Math.abs(bx - px);
        const dz = Math.abs(bz - pz);

        if (dx < 2.5 && dz < 5.0) {
            bossHitCooldown = boostActive ? BOSS_HIT_COOLDOWN * 0.4 : BOSS_HIT_COOLDOWN;
            const damage = boostActive ? Math.max(Math.floor(coinsCollected * 0.1), 5) : Math.floor(coinsCollected * 0.05);

            if (damage > 0) {
                bossHP -= damage;
                updateBossHPBar();
                showBossDamagePopup(damage);
                playSound('bossHit');

                // Flash boss red
                flashOverlay.style.background = '#FF4400';
                flashOverlay.style.opacity = '0.2';
                setTimeout(() => { flashOverlay.style.opacity = '0'; flashOverlay.style.background = 'red'; }, 150);

                if (bossHP <= 0) {
                    startBossDefeat();
                    return;
                }
            } else {
                // No coins = no damage, just bounce
                playSound('bossHit');
            }

            // Boosting: light bounce only, keep boost active
            if (boostActive) {
                bossBounceVel.z = BOSS_BOUNCE_VEL_Z * 0.3;
                bossBounceVel.y = BOSS_BOUNCE_VEL_Y * 0.3;
            } else {
                triggerBossBounce();
            }
        }
    }

    function triggerBossBounce() {
        bossBounceVel.z = BOSS_BOUNCE_VEL_Z;
        bossBounceVel.y = BOSS_BOUNCE_VEL_Y;
        // Reduce speed temporarily
        speed = Math.max(INITIAL_SPEED, speed * 0.6);
        deactivateBoost();
    }

    function startBossDefeat() {
        bossPhase = 'defeated';
        bossDefeatTimer = 2.0;
        playSound('bossDefeat');

        // Drop health pack at boss position
        if (bossMesh) {
            createHealthPack(bossMesh.position.x, bossMesh.position.z);
        }

        // Big explosion
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                if (bossMesh) {
                    createExplosion(
                        bossMesh.position.x + (Math.random() - 0.5) * 4,
                        1 + Math.random() * 3,
                        bossMesh.position.z + (Math.random() - 0.5) * 6
                    );
                }
            }, i * 200);
        }

        // Flash screen
        flashOverlay.style.background = '#FFAA00';
        flashOverlay.style.opacity = '0.4';
        setTimeout(() => { flashOverlay.style.opacity = '0'; flashOverlay.style.background = 'red'; }, 500);
    }

    function finishBossDefeat() {
        if (bossMesh) {
            scene.remove(bossMesh);
            bossMesh = null;
        }
        bossActive = false;
        bossPhase = 'none';
        bossHPBarEl.style.display = 'none';
        nextBossDist = distanceTraveled + BOSS_TRIGGER_DISTANCE;
        // Reset obstacle spawn distance to prevent immediate burst
        nextObstacleDist = OBSTACLE_SPAWN_DIST_MAX;
    }

    function showBossDamagePopup(damage) {
        if (!bossMesh) return;
        const vec = new THREE.Vector3();
        bossMesh.getWorldPosition(vec);
        vec.y += 3;
        vec.project(camera);
        const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;

        const popup = document.createElement('div');
        popup.className = 'boss-dmg-popup';
        popup.textContent = '-' + damage + ' HP';
        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 800);
    }

    function resetBossState() {
        if (bossMesh) {
            scene.remove(bossMesh);
            bossMesh = null;
        }
        bossActive = false;
        bossPhase = 'none';
        bossHP = 0;
        bossMaxHP = 0;
        bossLevel = 0;
        bossCurrentLane = 1;
        bossTargetX = 0;
        bossLaneSwitchTimer = 0;
        bossHitCooldown = 0;
        bossDefeatTimer = 0;
        nextBossDist = BOSS_TRIGGER_DISTANCE;
        bossBounceVel = { y: 0, z: 0 };
        bossWarningTimer = 0;
        bossWarningEl.style.display = 'none';
        bossHPBarEl.style.display = 'none';
    }

    // ==========================================
    // GAME STATE
    // ==========================================
    function startGame() {
        initAudio();
        startBGM();
        gameState = 'playing';
        score = 0;
        speed = INITIAL_SPEED;
        currentLane = 1;
        targetX = 0;
        distanceTraveled = 0;
        nextCoinDist = 10;
        nextObstacleDist = 50;
        nextGateDist = 80;
        coinsCollected = 0;

        // Clear boss
        resetBossState();

        // Clear existing objects
        coins.forEach(c => scene.remove(c));
        coins.length = 0;
        obstacles.forEach(o => scene.remove(o));
        obstacles.length = 0;
        gates.forEach(g => scene.remove(g));
        gates.length = 0;

        playerCar.position.set(0, 0, 0);
        playerCar.rotation.set(0, 0, 0);

        // Reset crash
        crashTimer = 0;
        crashVel = { x: 0, y: 0, z: 0 };
        crashRot = { x: 0, y: 0, z: 0 };
        exhaustParticles.forEach(p => p.visible = true);
        explosionParticles.forEach(p => scene.remove(p));
        explosionParticles.length = 0;
        scatterCoins.forEach(c => scene.remove(c));
        scatterCoins.length = 0;
        bombJumpVel = 0;
        isJumping = false;

        // Reset HP
        playerHP = PLAYER_MAX_HP;
        invincibleTimer = 0;
        hitSpinTimer = 0;
        hitVel = { x: 0, y: 0, z: 0 };
        hitRotVel = { x: 0, y: 0, z: 0 };
        updateHPBar();

        // Reset missile
        missileCharge = 0;
        cleanupMissile();
        updateMissileGauge();

        // Reset camera
        camera.position.set(0, 7, 13);
        camera.lookAt(0, 1, -20);

        // Reset boost
        boostFuel = BOOST_MAX_FUEL;
        boostActive = false;
        boostOverlay.style.opacity = '0';
        boostGaugeEl.classList.remove('active');
        boostGaugeEl.classList.remove('empty');
        boostFillEl.style.height = '100%';
        camera.fov = NORMAL_FOV;
        camera.updateProjectionMatrix();

        scoreValueEl.textContent = '0';
        startScreen.classList.add('hidden');
        startScreen.classList.remove('active');
        gameoverScreen.classList.add('hidden');
        gameoverScreen.classList.remove('active');
        hud.classList.remove('hidden');

        clock.getDelta(); // reset delta
    }

    function updateHPBar() {
        const pct = Math.max(0, playerHP / PLAYER_MAX_HP * 100);
        hpFillEl.style.width = pct + '%';
        hpLabelEl.textContent = 'HP ' + Math.round(pct) + '%';
        // Color shifts: green → yellow → red
        if (pct > 50) {
            hpFillEl.style.background = 'linear-gradient(90deg, #44CC44, #88FF44)';
        } else if (pct > 25) {
            hpFillEl.style.background = 'linear-gradient(90deg, #FFAA00, #FFDD00)';
        } else {
            hpFillEl.style.background = 'linear-gradient(90deg, #FF2222, #FF6644)';
        }
        hpBarEl.classList.remove('hit');
        void hpBarEl.offsetWidth; // reflow
        hpBarEl.classList.add('hit');
    }

    let hitSpinTimer = 0;
    let hitVel = { x: 0, y: 0, z: 0 };
    let hitRotVel = { x: 0, y: 0, z: 0 };

    function hitKnockback(hitObstacle) {
        invincibleTimer = PLAYER_INVINCIBLE_TIME;
        deactivateBoost();
        playSound('crash');

        // Launch car upward like crash (but recoverable)
        const dx = playerCar.position.x - hitObstacle.position.x;
        hitSpinTimer = 1.2;
        hitVel.x = dx * 3 + (Math.random() - 0.5) * 2;
        hitVel.y = 10 + Math.random() * 3;
        hitVel.z = 2 + Math.random() * 2;
        hitRotVel.x = (Math.random() - 0.5) * 6;
        hitRotVel.y = (Math.random() - 0.5) * 4;
        hitRotVel.z = (Math.random() - 0.5) * 8;

        // Explosion at impact
        createExplosion(
            (playerCar.position.x + hitObstacle.position.x) / 2,
            1,
            (playerCar.position.z + hitObstacle.position.z) / 2
        );

        // Flash red
        flashOverlay.style.opacity = '0.4';
        setTimeout(() => flashOverlay.style.opacity = '0', 300);

        // Remove the obstacle we hit
        scene.remove(hitObstacle);
        const idx = obstacles.indexOf(hitObstacle);
        if (idx >= 0) obstacles.splice(idx, 1);
    }

    function startCrash(hitObstacle) {
        gameState = 'crashing';
        deactivateBoost();
        playSound('crash');

        crashTimer = CRASH_DURATION;

        // Launch car away from obstacle
        const dx = playerCar.position.x - hitObstacle.position.x;
        crashVel.x = dx * 4 + (Math.random() - 0.5) * 3;
        crashVel.y = 10 + Math.random() * 5;
        crashVel.z = 3 + Math.random() * 3;

        crashRot.x = (Math.random() - 0.5) * 8;
        crashRot.y = (Math.random() - 0.5) * 5;
        crashRot.z = (Math.random() - 0.5) * 10;

        // Explosion at impact point
        createExplosion(
            (playerCar.position.x + hitObstacle.position.x) / 2,
            1,
            (playerCar.position.z + hitObstacle.position.z) / 2
        );

        // Hide exhaust
        exhaustParticles.forEach(p => p.visible = false);

        // Flash red
        flashOverlay.style.opacity = '0.5';
        setTimeout(() => flashOverlay.style.opacity = '0', 400);
    }

    function animateValue(el, target, suffix, duration) {
        const start = performance.now();
        (function tick(now) {
            const t = Math.min(1, (now - start) / duration);
            const v = Math.floor(target * (1 - Math.pow(1 - t, 3)));
            el.textContent = v.toLocaleString() + (suffix || '');
            if (t < 1) requestAnimationFrame(tick);
        })(performance.now());
    }

    function finishGameOver() {
        stopBGM();
        gameState = 'gameover';
        gameOverPhase = 'stats';
        newRankIdx = score > 0 ? getRankPosition(score) : -1;

        // Hide boss UI
        bossWarningEl.style.display = 'none';
        bossHPBarEl.style.display = 'none';
        cleanupMissile();

        // Reset sub-screens
        document.getElementById('goNewRecord').classList.add('hidden');
        document.getElementById('goRanking').classList.add('hidden');
        document.getElementById('btnRestart').classList.add('hidden');

        // Show screen
        gameoverScreen.classList.remove('hidden');
        gameoverScreen.classList.add('active');

        // Animate stats
        const dist = Math.floor(distanceTraveled);
        animateValue(document.getElementById('goScore'), score, '', 1200);
        animateValue(document.getElementById('goDistance'), dist, 'm', 1200);
        animateValue(document.getElementById('goCoins'), coinsCollected, '', 1000);

        // After stats animation, next phase
        setTimeout(() => {
            if (newRankIdx >= 0) {
                showNameEntry();
            } else {
                showRanking();
            }
        }, 1800);
    }

    function showNameEntry() {
        gameOverPhase = 'nameEntry';
        nameChars = [0, 0, 0];
        namePos = 0;
        const nr = document.getElementById('goNewRecord');
        nr.classList.remove('hidden');
        nr.style.animation = 'none'; nr.offsetHeight; nr.style.animation = '';
        updateNameDisplay();
    }

    function updateNameDisplay() {
        for (let i = 0; i < 3; i++) {
            const el = document.getElementById('nc' + i);
            el.textContent = ALPHABET[nameChars[i]];
            el.classList.toggle('active', i === namePos);
        }
    }

    // Global functions for onclick buttons
    window.nameCharChange = function(pos, dir) {
        if (gameOverPhase !== 'nameEntry') return;
        namePos = pos;
        nameChars[pos] = (nameChars[pos] + dir + ALPHABET.length) % ALPHABET.length;
        updateNameDisplay();
    };

    window.confirmName = function() {
        if (gameOverPhase !== 'nameEntry') return;
        const name = nameChars.map(i => ALPHABET[i]).join('');
        rankings.splice(newRankIdx, 0, { name, score });
        if (rankings.length > 10) rankings.length = 10;
        saveRankings();
        // 통합 리더보드에도 저장
        try {
            let all = JSON.parse(localStorage.getItem('gogo_arcade_leaderboard') || '[]');
            all.push({ name, score, game: '고고드라이브', date: new Date().toISOString().slice(0,10) });
            all.sort((a,b) => b.score - a.score);
            if (all.length > 30) all.length = 30;
            localStorage.setItem('gogo_arcade_leaderboard', JSON.stringify(all));
        } catch(e) {}
        document.getElementById('goNewRecord').classList.add('hidden');
        showRanking();
        playSound('coin');
    };

    function showRanking() {
        gameOverPhase = 'ranking';
        const list = document.getElementById('rankList');
        const ordinals = ['1ST','2ND','3RD','4TH','5TH','6TH','7TH','8TH','9TH','10TH'];

        let html = '<div class="rank-row header"><span class="rank-pos">RANK</span><span class="rank-name">NAME</span><span class="rank-score">SCORE</span></div>';

        const display = rankings.slice(0, 10);
        if (display.length === 0) {
            html += '<div style="text-align:center;color:#666;padding:16px;font-size:13px;">기록 없음</div>';
        }
        display.forEach((r, i) => {
            const isCurrent = (i === newRankIdx && r.score === score);
            html += '<div class="rank-row' + (isCurrent ? ' current' : '') + '">';
            html += '<span class="rank-pos">' + ordinals[i] + '</span>';
            html += '<span class="rank-name">' + r.name + '</span>';
            html += '<span class="rank-score">' + r.score.toLocaleString() + '</span>';
            if (isCurrent) html += '<span class="rank-you">&#9664; YOU</span>';
            html += '</div>';
        });

        list.innerHTML = html;
        const rk = document.getElementById('goRanking');
        rk.classList.remove('hidden');
        rk.style.animation = 'none'; rk.offsetHeight; rk.style.animation = '';
        // btnRestart hidden - restart disabled for arcade coin control
        newRankIdx = -1;
    }

    // ==========================================
    // GAME LOOP
    // ==========================================
    function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.05); // cap delta

        if (gameState === 'playing') {
            update(delta);
        } else if (gameState === 'crashing') {
            updateCrash(delta);
        }

        // Animate coins & bombs rotation
        const time = clock.elapsedTime;
        coins.forEach(coin => {
            if (coin.userData.isBomb) {
                coin.rotation.y = time * 2;
                coin.position.y = coin.userData.baseY + Math.sin(time * 3 + coin.userData.time) * 0.15;
                // Pulse the glow
                const glow = coin.children[3];
                if (glow) glow.material.opacity = 0.08 + Math.sin(time * 6) * 0.08;
            } else {
                coin.rotation.y = time * 3;
                coin.position.y = coin.userData.baseY + Math.sin(time * 2 + coin.userData.time) * 0.3;
            }
        });

        // Update explosion particles
        for (let i = explosionParticles.length - 1; i >= 0; i--) {
            const p = explosionParticles[i];
            p.userData.life -= delta;
            if (p.userData.life <= 0) {
                scene.remove(p);
                explosionParticles.splice(i, 1);
                continue;
            }
            if (p.userData.isFlash) {
                const s = 1 + (0.35 - p.userData.life) * 18;
                p.scale.setScalar(s);
                p.material.opacity = p.userData.life * 2.5;
            } else {
                p.position.x += p.userData.vx * delta;
                p.position.y += p.userData.vy * delta;
                p.position.z += p.userData.vz * delta;
                p.userData.vy -= 18 * delta;
                p.material.opacity = Math.max(0, p.userData.life * 1.8);
                p.rotation.x += 6 * delta;
                p.rotation.z += 4 * delta;
            }
        }

        // Update scatter coins (Sonic-style)
        for (let i = scatterCoins.length - 1; i >= 0; i--) {
            const c = scatterCoins[i];
            c.userData.life -= delta;
            if (c.userData.life <= 0) {
                scene.remove(c);
                scatterCoins.splice(i, 1);
                continue;
            }
            c.position.x += c.userData.vx * delta;
            c.position.y += c.userData.vy * delta;
            c.position.z += c.userData.vz * delta;
            c.userData.vy -= 18 * delta; // gravity
            c.rotation.x += c.userData.rotSpeed * delta;
            c.rotation.z += c.userData.rotSpeed * 0.6 * delta;
            // Bounce off ground
            if (c.position.y < 0.15 && c.userData.bounces < 3) {
                c.position.y = 0.15;
                c.userData.vy = Math.abs(c.userData.vy) * 0.45;
                c.userData.vx *= 0.6;
                c.userData.vz *= 0.6;
                c.userData.bounces++;
            }
            // Fade out & shrink in last 0.4s
            if (c.userData.life < 0.4) {
                const t = c.userData.life / 0.4;
                c.material.opacity = t;
                c.scale.setScalar(t);
            }
        }

        // Exhaust effect (boosted = bigger, brighter flames)
        if (gameState === 'playing') {
            const bMult = boostActive ? 3.0 : 1.0;
            const bSpread = boostActive ? 1.6 : 1.0;
            const bLen = boostActive ? 1.5 : 0.6;
            exhaustParticles.forEach(p => {
                p.scale.setScalar((0.3 + Math.random() * 1.8) * bMult);
                p.position.x = (Math.random() - 0.5) * bSpread;
                p.position.z = 2.5 + Math.random() * bLen;
                p.position.y = 0.12 + Math.random() * 0.2;
                p.material.opacity = boostActive ? 0.6 + Math.random() * 0.4 : 0.3 + Math.random() * 0.7;
                if (boostActive) {
                    p.material.color.setHex([0x0088FF, 0x00BBFF, 0xFFFFFF, 0xFF6600, 0xFFAA00][Math.floor(Math.random() * 5)]);
                } else {
                    p.material.color.setHex([0xFF4400, 0xFF6600, 0xFFAA00, 0xFFCC00][Math.floor(Math.random() * 4)]);
                }
            });
        }

        // Boost FOV animation
        const targetFOV = (gameState === 'playing' && boostActive) ? BOOST_FOV : NORMAL_FOV;
        camera.fov += (targetFOV - camera.fov) * 0.08;
        camera.updateProjectionMatrix();

        renderer.render(scene, camera);
    }

    function updateCrash(delta) {
        crashTimer -= delta;

        // Gravity
        crashVel.y -= 22 * delta;

        // Move car
        playerCar.position.x += crashVel.x * delta;
        playerCar.position.y += crashVel.y * delta;
        playerCar.position.z += crashVel.z * delta;

        // Bounce off ground
        if (playerCar.position.y < 0 && crashTimer > 0.3) {
            playerCar.position.y = 0;
            crashVel.y = Math.abs(crashVel.y) * 0.25;
            crashVel.x *= 0.6;
            crashVel.z *= 0.6;
        } else if (playerCar.position.y < -5) {
            playerCar.position.y = -5;
        }

        // Tumble
        playerCar.rotation.x += crashRot.x * delta;
        playerCar.rotation.y += crashRot.y * delta;
        playerCar.rotation.z += crashRot.z * delta;

        // Dampen rotation over time
        crashRot.x *= 0.995;
        crashRot.y *= 0.995;
        crashRot.z *= 0.995;

        // Camera shake (decreasing intensity)
        const shake = Math.max(0, crashTimer / CRASH_DURATION);
        camera.position.x = playerCar.position.x * 0.3 + (Math.random() - 0.5) * shake * 0.8;
        camera.position.y = 7 + Math.max(0, playerCar.position.y * 0.4) + (Math.random() - 0.5) * shake * 0.4;
        camera.lookAt(
            playerCar.position.x * 0.3,
            Math.max(1, 1 + playerCar.position.y * 0.3),
            -10
        );

        if (crashTimer <= 0) {
            finishGameOver();
        }
    }

    function update(delta) {
        // Invincibility timer + blink
        if (invincibleTimer > 0) {
            invincibleTimer -= delta;
            playerCar.visible = Math.floor(invincibleTimer * 8) % 2 === 0;
            if (invincibleTimer <= 0) {
                invincibleTimer = 0;
                playerCar.visible = true;
            }
        }

        // Hit spin animation (car flips like crash but recovers)
        if (hitSpinTimer > 0) {
            hitSpinTimer -= delta;

            // Gravity
            hitVel.y -= 22 * delta;

            // Move car
            playerCar.position.x += hitVel.x * delta;
            playerCar.position.y += hitVel.y * delta;
            playerCar.position.z += hitVel.z * delta;

            // Bounce off ground
            if (playerCar.position.y < 0) {
                playerCar.position.y = 0;
                hitVel.y = Math.abs(hitVel.y) * 0.2;
                hitVel.x *= 0.5;
                hitVel.z *= 0.5;
            }

            // Tumble
            playerCar.rotation.x += hitRotVel.x * delta;
            playerCar.rotation.y += hitRotVel.y * delta;
            playerCar.rotation.z += hitRotVel.z * delta;

            // Dampen rotation
            hitRotVel.x *= 0.98;
            hitRotVel.y *= 0.98;
            hitRotVel.z *= 0.98;

            if (hitSpinTimer <= 0) {
                hitSpinTimer = 0;
                playerCar.position.y = 0;
                playerCar.rotation.set(0, 0, 0);
                // Snap back to nearest lane
                let closest = 0, minD = 999;
                for (let i = 0; i < LANE_POSITIONS.length; i++) {
                    const d = Math.abs(playerCar.position.x - LANE_POSITIONS[i]);
                    if (d < minD) { minD = d; closest = i; }
                }
                currentLane = closest;
                targetX = LANE_POSITIONS[closest];
            }
        }

        // Increase base speed
        speed = Math.min(MAX_SPEED, speed + SPEED_INCREASE * delta);

        // Boost fuel logic
        if (boostActive && boostFuel > 0) {
            boostFuel = Math.max(0, boostFuel - BOOST_DRAIN_RATE * delta);
            if (boostFuel <= 0) deactivateBoost();
        } else if (!boostActive) {
            boostFuel = Math.min(BOOST_MAX_FUEL, boostFuel + BOOST_RECHARGE_RATE * delta);
        }
        boostFillEl.style.height = (boostFuel / BOOST_MAX_FUEL * 100) + '%';
        boostGaugeEl.classList.toggle('empty', boostFuel < 5);

        const effectiveSpeed = boostActive ? speed * BOOST_SPEED_MULT : speed;
        const moveDist = effectiveSpeed * delta;
        distanceTraveled += moveDist;

        speedIndicator.textContent = Math.floor(effectiveSpeed * 2) + ' km/h';

        // Distance-based score (1 point per 5 units)
        // (coins are main score source)

        // Move player to target lane (smooth)
        if (hitSpinTimer <= 0) {
            playerCar.position.x += (targetX - playerCar.position.x) * 0.12;
        }

        // Jump / Bomb jump physics (skip during hit spin)
        if (hitSpinTimer <= 0) {
            if (bombJumpVel !== 0 || playerCar.position.y > 0.01) {
                playerCar.position.y += bombJumpVel * delta;
                bombJumpVel -= JUMP_GRAVITY * delta;
                if (playerCar.position.y <= 0) {
                    playerCar.position.y = 0;
                    if (Math.abs(bombJumpVel) > 2) {
                        bombJumpVel = -bombJumpVel * 0.2; // small bounce
                    } else {
                        bombJumpVel = 0;
                        isJumping = false;
                    }
                }
                // Tilt car nose up while rising, nose down while falling
                playerCar.rotation.x = -bombJumpVel * 0.012;
            } else {
                playerCar.rotation.x = 0;
            }
        }

        // Jump shadow
        if (playerCar.position.y > 0.1) {
            jumpShadow.position.x = playerCar.position.x;
            jumpShadow.position.z = playerCar.position.z;
            jumpShadow.visible = true;
            const shadowScale = Math.max(0.3, 1 - playerCar.position.y * 0.08);
            jumpShadow.scale.set(shadowScale, shadowScale, 1);
            jumpShadow.material.opacity = Math.max(0.05, 0.3 - playerCar.position.y * 0.03);
        } else {
            jumpShadow.visible = false;
        }

        // Boss bounce physics (push player backward + hop)
        if (bossBounceVel.z !== 0 || bossBounceVel.y !== 0) {
            // Offset camera and boss to simulate player being pushed back
            camera.position.z += bossBounceVel.z * delta;
            if (bossMesh && bossPhase === 'fighting') {
                bossMesh.position.z -= bossBounceVel.z * delta;
            }
            playerCar.position.y += bossBounceVel.y * delta;
            bossBounceVel.y -= 20 * delta;
            if (playerCar.position.y <= 0) {
                playerCar.position.y = 0;
                bossBounceVel.y = 0;
            }
            bossBounceVel.z *= (1 - 3 * delta);
            if (Math.abs(bossBounceVel.z) < 0.5) bossBounceVel.z = 0;
            // Smoothly return camera
            if (bossBounceVel.z === 0) {
                camera.position.z += (13 - camera.position.z) * 0.1;
            }
        }

        // Car tilt when turning (skip during hit spin)
        if (hitSpinTimer <= 0) {
            const targetTilt = (targetX - playerCar.position.x) * -0.15;
            tiltAngle += (targetTilt - tiltAngle) * 0.1;
            playerCar.rotation.z = tiltAngle;
        }

        // Camera follow (subtle)
        camera.position.x += (playerCar.position.x * 0.35 - camera.position.x) * 0.06;

        // Move road chunks
        const totalRoadLen = NUM_ROAD_SEGMENTS * ROAD_SEGMENT_LENGTH;
        roadChunks.forEach(chunk => {
            chunk.position.z += moveDist;
            if (chunk.position.z > DESPAWN_DISTANCE) {
                chunk.position.z -= totalRoadLen;
            }
        });

        // Move scenery
        const moveScenery = (arr) => {
            arr.forEach(obj => {
                obj.position.z += moveDist;
                if (obj.position.z > DESPAWN_DISTANCE + 20) {
                    obj.position.z -= totalRoadLen;
                }
            });
        };
        moveScenery(sceneryLeft);
        moveScenery(sceneryRight);

        // Move gates
        for (let i = gates.length - 1; i >= 0; i--) {
            gates[i].position.z += moveDist;
            if (gates[i].position.z > DESPAWN_DISTANCE + 10) {
                scene.remove(gates[i]);
                gates.splice(i, 1);
            }
        }

        // Move coins
        for (let i = coins.length - 1; i >= 0; i--) {
            coins[i].position.z += moveDist;
            if (coins[i].position.z > DESPAWN_DISTANCE) {
                scene.remove(coins[i]);
                coins.splice(i, 1);
            }
        }

        // Move obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].position.z += moveDist * 0.7; // obstacles move slightly slower (relative speed)
            if (obstacles[i].position.z > DESPAWN_DISTANCE) {
                scene.remove(obstacles[i]);
                obstacles.splice(i, 1);
            }
        }

        // Spawn management
        nextCoinDist -= moveDist;
        if (nextCoinDist <= 0) {
            spawnCoinGroup();
            nextCoinDist = COIN_SPAWN_DIST + Math.random() * 20;
        }

        if (!bossActive && bossPhase !== 'warning') {
            nextObstacleDist -= moveDist;
            if (nextObstacleDist <= 0) {
                spawnObstacle();
                const difficultyFactor = Math.max(0.4, 1 - distanceTraveled / 3000);
                nextObstacleDist = OBSTACLE_SPAWN_DIST_MIN * difficultyFactor +
                    Math.random() * (OBSTACLE_SPAWN_DIST_MAX - OBSTACLE_SPAWN_DIST_MIN) * difficultyFactor;
            }
        }

        nextGateDist -= moveDist;
        if (nextGateDist <= 0) {
            createGateArch(SPAWN_DISTANCE);
            nextGateDist = 120 + Math.random() * 80;
        }

        // Boss system
        checkBossTrigger();
        if (bossActive || bossPhase === 'warning') {
            updateBoss(delta, moveDist);
        }

        // Missile system
        updateMissile(delta);

        // Collisions
        checkCollisions();
    }

    // ==========================================
    // RESIZE
    // ==========================================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==========================================
    // INIT
    // ==========================================
    function init() {
        setupScene();
        createRoad();
        createPlayerCar();
        createScenery();
        setupInput();

        // Button events
        document.getElementById('btnStart').addEventListener('click', startGame);
        // btnRestart disabled for arcade coin control

        // Global keydown: name entry + start/restart
        document.addEventListener('keydown', (e) => {
            // Name entry input
            if (gameState === 'gameover' && gameOverPhase === 'nameEntry') {
                if (e.key === 'ArrowUp') { nameCharChange(namePos, 1); }
                else if (e.key === 'ArrowDown') { nameCharChange(namePos, -1); }
                else if (e.key === 'ArrowLeft') { namePos = Math.max(0, namePos - 1); updateNameDisplay(); }
                else if (e.key === 'ArrowRight') { namePos = Math.min(2, namePos + 1); updateNameDisplay(); }
                else if (e.key === 'Enter') { confirmName(); }
                e.preventDefault();
                return;
            }
            if (e.key === ' ' || e.key === 'Enter') {
                if (gameState === 'menu') { startGame(); }
                // restart disabled for arcade coin control
            }
        });

        animate();
    }

    init();
    </script>
</body>
